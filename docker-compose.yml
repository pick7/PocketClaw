services:
  pocketclaw:
    build:
      context: .
      dockerfile: Dockerfile.custom
    container_name: pocketclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - ./config/workspace:/home/node/.openclaw/workspace
      - ./data/credentials:/home/node/.openclaw/credentials
      - ./data/sessions:/home/node/.openclaw/sessions
      - ./data/logs:/home/node/.openclaw/logs
      - ./data/skills:/home/node/.openclaw/skills
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - OPENCLAW_MODEL=${OPENCLAW_MODEL:-glm-4.7-flash}
      - GATEWAY_AUTH_PASSWORD=${GATEWAY_AUTH_PASSWORD:-pocketclaw}
      - PROVIDER_NAME=${PROVIDER_NAME:-zhipu}
      # ── Chromium 无头浏览器配置 ──
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - PUPPETEER_SKIP_DOWNLOAD=true
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - CHROMIUM_FLAGS=--no-sandbox --disable-gpu --disable-dev-shm-usage
      # ── 频道配置（按需填写，留空则不启用） ──
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - WHATSAPP_ALLOW_FROM=${WHATSAPP_ALLOW_FROM:-}
      - SIGNAL_PHONE_NUMBER=${SIGNAL_PHONE_NUMBER:-}
      - GOOGLE_CHAT_CREDENTIALS=${GOOGLE_CHAT_CREDENTIALS:-}
      - GOOGLE_CHAT_SPACES=${GOOGLE_CHAT_SPACES:-}
      - MSTEAMS_APP_ID=${MSTEAMS_APP_ID:-}
      - MSTEAMS_APP_PASSWORD=${MSTEAMS_APP_PASSWORD:-}
      - MATRIX_HOMESERVER=${MATRIX_HOMESERVER:-}
      - MATRIX_USER_ID=${MATRIX_USER_ID:-}
      - MATRIX_ACCESS_TOKEN=${MATRIX_ACCESS_TOKEN:-}
      - BLUEBUBBLES_SERVER_URL=${BLUEBUBBLES_SERVER_URL:-}
      - BLUEBUBBLES_PASSWORD=${BLUEBUBBLES_PASSWORD:-}
      - ZALO_OA_ACCESS_TOKEN=${ZALO_OA_ACCESS_TOKEN:-}
    networks:
      - pocketclaw-net

    # ── 安全加固 ──
    security_opt:
      - no-new-privileges:true           # 禁止容器内提权
    cap_drop:
      - ALL                              # 丢弃所有 Linux capabilities
    cap_add:
      - NET_BIND_SERVICE                 # 仅保留端口绑定能力
    mem_limit: 2g                        # 内存上限 2GB，防止内存耗尽攻击
    pids_limit: 128                      # 进程数上限，防止 fork 炸弹
    tmpfs:
      - /tmp:size=100M,noexec,nosuid     # 临时目录: 禁止执行、禁止 setuid

networks:
  pocketclaw-net:
    driver: bridge
