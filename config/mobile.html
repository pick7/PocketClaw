<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#075E54">
<title>PocketClaw</title>
<style>
/* ── CSS 变量 / 主题 ── */
:root {
  --bg: #ECE5DD;
  --header-bg: #075E54;
  --header-text: #fff;
  --user-bubble: #DCF8C6;
  --ai-bubble: #fff;
  --text-color: #303030;
  --text-secondary: #667781;
  --input-bg: #fff;
  --input-border: #ccc;
  --send-btn: #075E54;
  --send-btn-active: #128C7E;
  --danger: #e74c3c;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius: 18px;
}

/* ── 全局重置 ── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 16px;
  color: var(--text-color);
  background: var(--bg);
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

/* ── 页面布局：header + messages + input ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

/* ── 顶部导航栏 ── */
#header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  padding-top: calc(10px + var(--safe-top));
  background: var(--header-bg);
  color: var(--header-text);
  z-index: 10;
}
#header .title {
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
#header .status {
  font-size: 12px;
  opacity: 0.8;
}
#header .status.connected { color: #25D366; opacity: 1; }
#header .status.error { color: #ff6b6b; opacity: 1; }
#header .api-info {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 1px;
}

/* 模式切换按钮 */
#mode-toggle {
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  font-size: 22px;
  width: 40px; height: 40px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#mode-toggle:active { background: rgba(255,255,255,0.4); }

/* ── 消息区域 ── */
#messages {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 10px;
  padding-bottom: 8px;
  scroll-behavior: smooth;
}

/* 消息容器 */
.msg {
  display: flex;
  margin-bottom: 6px;
  max-width: 85%;
  animation: fadeIn 0.2s ease;
}
.msg.user { margin-left: auto; flex-direction: row-reverse; }
.msg.ai { margin-right: auto; }

/* 气泡 */
.bubble {
  padding: 8px 12px;
  border-radius: var(--radius);
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
  font-size: 15px;
  position: relative;
  box-shadow: 0 1px 1px rgba(0,0,0,0.08);
}
.msg.user .bubble {
  background: var(--user-bubble);
  border-top-right-radius: 4px;
}
.msg.ai .bubble {
  background: var(--ai-bubble);
  border-top-left-radius: 4px;
}

/* 气泡内 Markdown */
.bubble p { margin: 0 0 6px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble code {
  background: rgba(0,0,0,0.06);
  padding: 1px 4px;
  border-radius: 4px;
  font-size: 13px;
  font-family: Menlo, Consolas, monospace;
}
.bubble pre {
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 10px;
  border-radius: 8px;
  overflow-x: auto;
  font-size: 13px;
  margin: 6px 0;
  line-height: 1.4;
}
.bubble pre code {
  background: none;
  padding: 0;
  color: inherit;
}
.bubble a { color: #128C7E; text-decoration: underline; }
.bubble ul, .bubble ol { padding-left: 20px; margin: 4px 0; }
.bubble strong { font-weight: 600; }
.bubble em { font-style: italic; }
.bubble blockquote {
  border-left: 3px solid #128C7E;
  padding-left: 10px;
  margin: 6px 0;
  color: var(--text-secondary);
}
.bubble h1, .bubble h2, .bubble h3, .bubble h4 {
  margin: 8px 0 4px;
  font-weight: 600;
  line-height: 1.3;
}
.bubble h1 { font-size: 1.3em; }
.bubble h2 { font-size: 1.2em; }
.bubble h3 { font-size: 1.1em; }
.bubble h4 { font-size: 1.05em; }
.bubble del { text-decoration: line-through; color: var(--text-secondary); }
.bubble hr { border: none; border-top: 1px solid #ddd; margin: 8px 0; }
.bubble table {
  border-collapse: collapse;
  margin: 6px 0;
  font-size: 13px;
  width: 100%;
  overflow-x: auto;
  display: block;
}
.bubble th, .bubble td {
  border: 1px solid #ddd;
  padding: 4px 8px;
  text-align: left;
}
.bubble th {
  background: rgba(0,0,0,0.05);
  font-weight: 600;
}

/* 时间戳 */
.msg-time {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
  padding: 0 6px;
  align-self: flex-end;
}

/* 系统消息 */
.sys-msg {
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
  background: rgba(0,0,0,0.04);
  padding: 4px 14px;
  border-radius: 12px;
  margin: 8px auto;
  max-width: 80%;
}

/* 工具调用提示 */
.tool-msg {
  text-align: center;
  font-size: 12px;
  color: #128C7E;
  background: rgba(18,140,126,0.08);
  padding: 4px 14px;
  border-radius: 12px;
  margin: 4px auto;
  max-width: 90%;
}

/* 思考中动画 */
.typing-indicator {
  display: inline-flex;
  gap: 4px;
  padding: 10px 16px;
}
.typing-indicator span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #999;
  animation: blink 1.4s infinite both;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 流式输出光标 */
.stream-cursor {
  display: inline;
  animation: stream-blink 0.8s steps(2) infinite;
  color: var(--text-secondary, #999);
  font-weight: normal;
}
@keyframes stream-blink {
  0% { opacity: 1; }
  50% { opacity: 0; }
}

/* ── 输入区域 ── */
#input-area {
  flex-shrink: 0;
  padding: 8px 10px;
  padding-bottom: calc(8px + var(--safe-bottom));
  background: #F0F0F0;
  border-top: 1px solid #ddd;
}

/* 输入行 */
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}

/* 文本输入 */
#msg-input {
  flex: 1;
  border: 1px solid var(--input-border);
  border-radius: 22px;
  padding: 10px 16px;
  font-size: 16px;
  line-height: 1.4;
  resize: none;
  outline: none;
  background: var(--input-bg);
  max-height: 120px;
  font-family: inherit;
  -webkit-appearance: none;
}
#msg-input:focus { border-color: var(--send-btn); }

/* 发送按钮 */
#send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--send-btn);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#send-btn:disabled { opacity: 0.4; cursor: default; }
#send-btn:not(:disabled):active { background: var(--send-btn-active); }

/* 语音输入行 */
#voice-input-row {
  justify-content: center;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
}

/* 麦克风按钮 */
#mic-btn {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 3px solid var(--send-btn);
  background: #fff;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#mic-btn.listening {
  background: var(--danger);
  border-color: var(--danger);
  animation: pulse 1.5s infinite;
}
#voice-hint {
  font-size: 13px;
  color: var(--text-secondary);
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
  50% { box-shadow: 0 0 0 12px rgba(231,76,60,0); }
}

/* ── 工具提示 Toast ── */
#toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 14px 24px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.6;
  max-width: 85vw;
  text-align: left;
  white-space: pre-line;
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
}
#toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
#debug-panel {
  background: #1a1a2e; color: #0f0; font: 11px/1.4 monospace;
  padding: 8px 12px; max-height: 150px; overflow-y: auto;
  display: block; border-bottom: 2px solid #e94560;
}
#debug-panel.hide { display: none; }
#debug-panel div { word-break: break-all; }
#debug-panel .err { color: #e94560; }
#debug-panel .ok { color: #0f0; }
#debug-panel .info { color: #8af; }

/* ── U3: 暗色模式 ── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111B21;
    --header-bg: #1F2C33;
    --header-text: #E9EDEF;
    --user-bubble: #005C4B;
    --ai-bubble: #1F2C33;
    --text-color: #E9EDEF;
    --text-secondary: #8696A0;
    --input-bg: #2A3942;
    --input-border: #3B4A54;
    --send-btn: #00A884;
    --send-btn-active: #06CF9C;
  }
  body { background: var(--bg); }
  #input-area { background: #1F2C33; border-top-color: #3B4A54; }
  .bubble pre { background: #0B141A; }
  .bubble th { background: rgba(255,255,255,0.08); }
  .bubble td, .bubble th { border-color: #3B4A54; }
  .sys-msg { background: rgba(255,255,255,0.06); }
  .tool-msg { background: rgba(0,168,132,0.12); color: #06CF9C; }
  #toast { background: rgba(255,255,255,0.85); color: #111; }
}

/* ── U5: 搜索栏 ── */
#search-bar {
  display: none;
  padding: 6px 10px;
  background: var(--header-bg);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
#search-bar.show { display: flex; gap: 8px; align-items: center; }
#search-input {
  flex: 1; border: none; border-radius: 16px;
  padding: 6px 14px; font-size: 14px;
  background: rgba(255,255,255,0.15); color: var(--header-text);
  outline: none;
}
#search-input::placeholder { color: rgba(255,255,255,0.5); }
#search-close {
  background: none; border: none; color: var(--header-text);
  font-size: 18px; cursor: pointer; padding: 4px;
}
.msg .bubble .highlight { background: rgba(255,255,0,0.35); border-radius: 2px; }

/* ── N3: 导出/搜索按钮 ── */
.header-actions { display: flex; gap: 6px; align-items: center; }
.header-btn {
  background: rgba(255,255,255,0.2); border: none; color: #fff;
  font-size: 18px; width: 36px; height: 36px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.header-btn:active { background: rgba(255,255,255,0.4); }

/* ── B2: 多会话选择器 ── */
#session-panel {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center;
}
#session-panel.show { display: flex; }
#session-dialog {
  background: var(--bg); border-radius: 12px; padding: 16px; width: 280px;
  max-height: 60vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
#session-dialog h3 { margin: 0 0 12px; font-size: 16px; }
.session-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 6px;
  background: rgba(128,128,128,0.1); transition: background 0.15s;
}
.session-item:hover, .session-item.active { background: rgba(0,168,132,0.2); }
.session-item .del-btn {
  background: none; border: none; color: #f44; font-size: 14px; cursor: pointer;
  padding: 2px 6px; border-radius: 4px;
}
.session-item .del-btn:hover { background: rgba(255,68,68,0.15); }
#new-session-btn {
  width: 100%; padding: 10px; border: 1px dashed rgba(128,128,128,0.4);
  background: none; color: var(--text); border-radius: 8px; cursor: pointer;
  font-size: 14px; margin-top: 4px;
}
#new-session-btn:hover { background: rgba(128,128,128,0.1); }

/* ── D4: 代码块复制按钮 ── */
.code-block { position: relative; margin: 8px 0; }
.code-block pre { margin: 0; }
.code-lang {
  position: absolute; top: 4px; left: 10px; font-size: 11px;
  color: rgba(255,255,255,0.45); font-family: monospace; text-transform: uppercase;
}
.code-copy {
  position: absolute; top: 4px; right: 6px; background: rgba(255,255,255,0.15);
  border: none; color: #fff; font-size: 14px; padding: 2px 6px; border-radius: 4px;
  cursor: pointer; opacity: 0.5; transition: opacity 0.15s;
}
.code-block:hover .code-copy { opacity: 1; }
.code-copy:active { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="app">
  <!-- 顶部栏 -->
  <div id="header">
    <div>
      <div class="title" id="title-tap">🤖 PocketClaw</div>
      <div class="status" id="conn-status">连接中...</div>
      <div class="api-info" id="api-info"></div>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="session-toggle" title="切换会话">📋</button>
      <button class="header-btn" id="search-toggle" title="搜索消息">🔍</button>
      <button class="header-btn" id="export-btn" title="导出聊天记录">💾</button>
      <button id="mode-toggle" title="切换文字/语音">⌨️</button>
    </div>
  </div>

  <!-- B2: 多会话面板 -->
  <div id="session-panel">
    <div id="session-dialog">
      <h3>💬 会话管理</h3>
      <div id="session-list"></div>
      <button id="new-session-btn">+ 新建会话</button>
    </div>
  </div>

  <!-- U5: 搜索栏 -->
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="搜索消息..." autocomplete="off">
    <button id="search-close">✖</button>
  </div>

  <!-- 调试面板（点击标题 3 次显示） -->
  <div id="debug-panel" class="hide"></div>

  <!-- 消息列表 -->
  <div id="messages"></div>

  <!-- 输入区 -->
  <div id="input-area">
    <!-- 文本模式 -->
    <div id="text-input-row" class="input-row">
      <textarea id="msg-input" rows="1" placeholder="输入消息..." autocomplete="off"></textarea>
      <button id="send-btn" disabled>➤</button>
    </div>
    <!-- 语音模式 -->
    <div id="voice-input-row" class="input-row" style="display:none;">
      <button id="mic-btn">🎤</button>
      <span id="voice-hint">点击开始说话</span>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- 独立调试脚本（即使主脚本有语法错误也能工作） -->
<script>
(function(){
  var panel = document.getElementById('debug-panel');
  var logs = [];
  window._dbg = function(msg, cls) {
    var ts = new Date().toLocaleTimeString('zh-CN', {hour12:false});
    logs.push({ts:ts, msg:msg, cls:cls||'info'});
    if (logs.length > 80) logs.shift();
    if (panel) {
      var d = document.createElement('div');
      d.className = cls || 'info';
      d.textContent = ts + ' ' + msg;
      panel.appendChild(d);
      panel.scrollTop = panel.scrollHeight;
    }
  };
  window.onerror = function(msg, src, line, col) {
    window._dbg('JS ERROR: ' + msg + ' @L' + line + ':' + col, 'err');
  };
  window.addEventListener('unhandledrejection', function(e) {
    window._dbg('PROMISE: ' + (e.reason && e.reason.message || e.reason), 'err');
  });
  window._dbg('Debug panel ready');

  // 延迟检查主脚本是否加载成功
  setTimeout(function() {
    if (!window._PC_LOADED) {
      window._dbg('MAIN SCRIPT NOT LOADED!', 'err');
      window._dbg('UA: ' + navigator.userAgent, 'info');
      window._dbg('URL: ' + location.href, 'info');
      window._dbg('Hash: ' + location.hash, 'info');
      // 记录基本信息便于远程调试
    } else {
      window._dbg('Main script loaded OK', 'ok');
    }
  }, 1500);
})();
</script>

<script>
/* ── PocketClaw Mobile Client ── */
(function() {
'use strict';

window._PC_LOADED = true;  // 标记主脚本已加载（供调试面板检测）

var dbg = window._dbg || function(){};

// ── 全局状态 ──
const STATE = {
  ws: null,
  connected: false,
  token: '',
  connectNonce: '',
  connectSent: false,
  connectTimer: null,
  sessionKey: 'main',
  chatRunId: null,
  chatStream: '',
  pending: new Map(),    // id -> {resolve, reject}
  mode: 'text',          // 'text' | 'voice'
  lastInputWasVoice: false,
  ttsEnabled: true,
  isListening: false,
  recognition: null,
  reconnectTimer: null,
  backoffMs: 800,
  retryCount: 0,
  firstConnectTime: 0,
};

// ── DOM 缓存 ──
const $ = id => document.getElementById(id);
const DOM = {};

// ── 聊天记录持久化（JSON 结构化存储） ──
const STORAGE_KEY = 'pocketclaw_chat_history';
const CHAT_MAX_MESSAGES = 200;
const chatHistory = [];

function saveChatHistory() {
  try {
    // 限制最大消息数，避免 localStorage 溢出
    while (chatHistory.length > CHAT_MAX_MESSAGES) chatHistory.shift();
    // A4: 根据当前会话使用不同 key
    const key = STATE.sessionKey ? STORAGE_KEY + '_' + STATE.sessionKey : STORAGE_KEY;
    localStorage.setItem(key, JSON.stringify(chatHistory));
  } catch(e) {}
}
function loadChatHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    // 兼容旧版 innerHTML 格式：如果不是 JSON 数组，丢弃旧数据
    if (raw.charAt(0) !== '[') {
      localStorage.removeItem(STORAGE_KEY);
      return [];
    }
    return JSON.parse(raw);
  } catch(e) { return []; }
}
function clearChatHistory() {
  chatHistory.length = 0;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// ── 工具函数 ──
function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function showToast(msg, ms) {
  const t = DOM.toast;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms || 2000);
}

function setStatus(text, cls) {
  DOM.status.textContent = text;
  DOM.status.className = 'status' + (cls ? ' ' + cls : '');
}

function fetchApiInfo() {
  fetch(location.origin + '/api-info', { cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var el = document.getElementById('api-info');
      if (el && d.label && d.model) {
        el.textContent = d.label + ' / ' + d.model;
      }
    }).catch(function() {});
}

function timeStr() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

// ── 连接排障提示 ──
function showConnectHelp() {
  const tips = [];
  tips.push('📶 请确认手机和电脑在同一 WiFi 下');
  tips.push('🔄 尝试关闭页面重新扫码');
  const msg = tips.join('\n');
  showToast(msg, 8000);
  dbg('Show help: retries=' + STATE.retryCount, 'info');
}

// ── HTTP 连通性预检（WebSocket 连接前先确认 HTTP 可达） ──
function httpPreCheck() {
  return fetch(location.origin + '/health', { mode: 'no-cors', cache: 'no-store' })
    .then(function() { return true; })
    .catch(function() { return false; });
}

// ── WebSocket 连接 ──
function wsConnect() {
  if (STATE.ws) { try { STATE.ws.close(); } catch(e){} }
  clearTimeout(STATE.reconnectTimer);
  clearTimeout(STATE.connectTimer);
  STATE.connectSent = false;
  STATE.connectNonce = null;
  STATE.retryCount++;
  if (!STATE.firstConnectTime) STATE.firstConnectTime = Date.now();

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = proto + '//' + location.host;
  const retryLabel = STATE.retryCount > 1 ? '(第' + STATE.retryCount + '次)' : '';
  setStatus('连接中...' + retryLabel, '');
  dbg('WS connecting → ' + url + ' retry=' + STATE.retryCount);

  // 第 3 次重试时：先做 HTTP 预检 + 显示排障提示
  if (STATE.retryCount === 3) {
    httpPreCheck().then(function(ok) {
      if (!ok) {
        dbg('HTTP pre-check FAILED — 网络不可达', 'err');
        setStatus('网络不可达', 'error');
        showToast('无法连接服务器，请确认手机和电脑在同一WiFi下', 5000);
      } else {
        dbg('HTTP pre-check OK — 网络正常但 WS 失败', 'err');
        showConnectHelp();
      }
    });
  }
  // 第 5 次重试时自动打开调试面板
  if (STATE.retryCount === 5) {
    const dp = $('debug-panel');
    if (dp) dp.classList.remove('hide');
  }

  let ws;
  try {
    ws = new WebSocket(url);
  } catch(e) {
    dbg('WS constructor error: ' + e.message, 'err');
    setStatus('连接失败', 'error');
    scheduleReconnect();
    return;
  }
  STATE.ws = ws;

  ws.onopen = () => {
    dbg('WS opened!', 'ok');
    STATE.backoffMs = 800;
    // 等待 connect.challenge 事件再发送 connect（匹配官方 control-ui 行为）
    // 设置 750ms 兜底定时器，若 challenge 未到则直接连接
    STATE.connectTimer = setTimeout(() => {
      if (!STATE.connectSent) {
        dbg('challenge timeout, sending connect directly');
        sendConnect();
      }
    }, 750);
  };

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }
    if (msg.type === 'event' && msg.event === 'connect.challenge') {
      dbg('Got challenge nonce=' + (msg.payload && msg.payload.nonce || '?').slice(0,8));
    }
    handleMessage(msg);
  };

  ws.onclose = (evt) => {
    STATE.connected = false;
    clearTimeout(STATE.connectTimer);
    dbg('WS closed code=' + evt.code + ' reason=' + (evt.reason || 'n/a'), 'err');
    setStatus('已断开', 'error');
    scheduleReconnect();
  };

  ws.onerror = (evt) => {
    STATE.connected = false;
    dbg('WS error event fired', 'err');
    setStatus('连接失败', 'error');
  };
}

function scheduleReconnect() {
  clearTimeout(STATE.reconnectTimer);
  STATE.reconnectTimer = setTimeout(() => {
    wsConnect();
  }, STATE.backoffMs);
  STATE.backoffMs = Math.min(STATE.backoffMs * 1.5, 15000);
}

// 检测连接是否存活
function checkAlive() {
  if (!STATE.ws || STATE.ws.readyState !== WebSocket.OPEN) {
    dbg('Connection dead, reconnecting...', 'err');
    STATE.connected = false;
    setStatus('重连中...', '');
    wsConnect();
    return;
  }
  // 发送 health ping 检测
  try {
    request('health', {}).then(() => {
      dbg('Health OK', 'ok');
    }).catch(() => {
      dbg('Health failed, reconnecting...', 'err');
      STATE.connected = false;
      wsConnect();
    });
  } catch(e) {
    wsConnect();
  }
}

function sendJSON(obj) {
  if (STATE.ws && STATE.ws.readyState === WebSocket.OPEN) {
    STATE.ws.send(JSON.stringify(obj));
  }
}

// 发送 RPC 请求，返回 Promise
function request(method, params) {
  return new Promise((resolve, reject) => {
    const id = uuid();
    STATE.pending.set(id, { resolve, reject, method });
    sendJSON({ type: 'req', id, method, params: params || {} });
    // 超时 30s
    setTimeout(() => {
      if (STATE.pending.has(id)) {
        STATE.pending.delete(id);
        reject(new Error('Request timeout'));
      }
    }, 30000);
  });
}

// 发送 connect 请求
function sendConnect() {
  if (STATE.connectSent) return;
  STATE.connectSent = true;
  clearTimeout(STATE.connectTimer);
  const params = {
    minProtocol: 3,
    maxProtocol: 3,
    client: {
      id: 'webchat-ui',
      version: '1.0',
      platform: 'mobile-web',
      mode: 'webchat'
    },
    role: 'operator',
    scopes: ['operator.admin'],
    caps: [],
    auth: { token: STATE.token },
    userAgent: navigator.userAgent,
    locale: navigator.language || 'zh-CN'
  };
  request('connect', params).then(res => {
    STATE.connected = true;
    STATE.retryCount = 0;
    setStatus('已连接', 'connected');
    fetchApiInfo();
    dbg('Connected OK!', 'ok');
    // 连接成功后隐藏调试面板
    const dp = $('debug-panel');
    if (dp) dp.classList.add('hide');
  }).catch(err => {
    setStatus('认证失败', 'error');
    dbg('Connect failed: ' + (err.message || JSON.stringify(err)), 'err');
    showToast('认证失败: ' + (err.message || err));
  });
}

// ── 消息分发 ──
function handleMessage(msg) {
  // 响应
  if (msg.type === 'res') {
    const p = STATE.pending.get(msg.id);
    if (p) {
      STATE.pending.delete(msg.id);
      if (msg.ok) p.resolve(msg.payload);
      else p.reject(msg.error || { message: 'Unknown error' });
    }
    return;
  }
  // 事件
  if (msg.type === 'event') {
    handleEvent(msg);
  }
}

function handleEvent(msg) {
  const evt = msg.event;
  const payload = msg.payload;

  // connect.challenge → 收到 nonce 后发送 connect
  if (evt === 'connect.challenge') {
    const nonce = payload && payload.nonce;
    if (nonce) {
      STATE.connectNonce = nonce;
      STATE.connectSent = false;   // 允许（重新）认证
      clearTimeout(STATE.connectTimer);
      sendConnect();
    }
    return;
  }

  // chat 事件（子步骤 4 实现处理逻辑）
  if (evt === 'chat') {
    handleChatEvent(payload);
    return;
  }

  // exec.approval.requested → 自动批准（子步骤 5 实现）
  if (evt === 'exec.approval.requested') {
    handleApproval(payload);
    return;
  }
}

function handleChatEvent(payload) {
  if (!payload) return;
  // sessionKey 可能是 'agent:main:main' 等格式，只要包含我们的 key 即可
  var sk = payload.sessionKey || '';
  if (sk !== STATE.sessionKey && sk.indexOf(STATE.sessionKey) === -1) return;
  const state = payload.state;
  const msgData = payload.message;

  if (state === 'delta') {
    // delta 包含完整累积文本
    const text = extractText(msgData);
    if (typeof text === 'string') {
      STATE.chatStream = text;
      updateStreamBubble(text);
    }
  } else if (state === 'final') {
    const text = extractText(msgData);
    if (text !== null) {
      finalizeAIMessage(text || STATE.chatStream || '');
    }
    STATE.chatStream = '';
    STATE.chatRunId = null;
    removeTypingIndicator();
  } else if (state === 'aborted') {
    const text = extractText(msgData) || STATE.chatStream || '';
    if (text.trim()) finalizeAIMessage(text);
    STATE.chatStream = '';
    STATE.chatRunId = null;
    removeTypingIndicator();
  }
}

function handleApproval(payload) {
  // 自动批准所有工具调用
  if (!payload || !payload.id) return;
  const desc = payload.description || payload.tool || '工具调用';
  addToolMsg('🔧 ' + desc);
  request('exec.approval.resolve', { id: payload.id, decision: 'approve' }).catch(() => {});
}

// ── 文本提取 ──
function extractText(msg) {
  if (!msg) return null;
  const content = msg.content;
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) {
    const parts = content.filter(p => p && p.type === 'text').map(p => p.text || '');
    return parts.join('\n');
  }
  return null;
}

// ── Markdown 渲染（Q3: 增强版 + XSS 安全加固） ──

// D4: 复制代码块内容
function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code');
  if (!code) return;
  navigator.clipboard.writeText(code.textContent).then(() => {
    btn.textContent = '\u2705';
    setTimeout(() => { btn.textContent = '\u{1f4cb}'; }, 1500);
  }).catch(() => {
    // fallback for non-HTTPS
    const ta = document.createElement('textarea');
    ta.value = code.textContent;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '\u2705';
    setTimeout(() => { btn.textContent = '\u{1f4cb}'; }, 1500);
  });
}

// D1: 通知 API（标签页失焦时新消息通知）
function notifyNewMessage(text) {
  if (document.visibilityState !== 'hidden') return;
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    const n = new Notification('PocketClaw', {
      body: (text || '').slice(0, 100),
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🤖</text></svg>',
      tag: 'pocketclaw-msg'
    });
    setTimeout(() => n.close(), 5000);
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

function renderMd(text) {
  if (!text) return '';

  // 提取代码块，防止内部内容被 Markdown 处理
  var codeBlocks = [];
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    var escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var langLabel = lang ? '<span class="code-lang">' + lang + '</span>' : '';
    // D4: 添加复制按钮
    codeBlocks.push('<div class="code-block">' + langLabel + '<button class="code-copy" onclick="copyCode(this)">\u{1f4cb}</button><pre><code>' + escaped + '</code></pre></div>');
    return '\x00CB' + (codeBlocks.length - 1) + '\x00';
  });

  // 提取行内代码
  var inlineCodes = [];
  text = text.replace(/`([^`]+)`/g, function(m, code) {
    inlineCodes.push('<code>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code>');
    return '\x00IC' + (inlineCodes.length - 1) + '\x00';
  });

  var h = text
    // 转义 HTML（代码块/行内代码已提取，不受影响）
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // 标题（h1-h4）
    .replace(/^####\s+(.+)$/gm, '<h4>$1</h4>')
    .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
    // 水平分隔线
    .replace(/^[-*_]{3,}\s*$/gm, '<hr>')
    // 粗体
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // 斜体
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // 删除线
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    // 链接（XSS 防护: 仅允许 http/https 协议，sanitize属性）
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(m, text, url) {
      url = url.replace(/["'<>]/g, '');  // Q3: 额外XSS清理
      if (/^https?:\/\//i.test(url)) {
        return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + text + '</a>';
      }
      return text;
    });

  // D5: 自动识别裸 URL 并变为可点击链接（排除已被 <a> 包裹的）
  // 注意：不使用 lookbehind (?<!...) — iOS Safari < 16.4 不支持
  h = h.replace(/(^|[^="'>])(https?:\/\/[^\s<,;)}\]]+)/g, function(m, pre, url) {
    return pre + '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + url + '</a>';
  })
    // 引用
    .replace(/^&gt;\s?(.+)$/gm, '<blockquote>$1</blockquote>')
    // 无序列表
    .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
    // 有序列表
    .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

  // 包裹连续 li
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // 简易表格支持
  h = h.replace(/((?:^\|.+\|\s*\n)+)/gm, function(tableBlock) {
    var rows = tableBlock.trim().split('\n');
    var html = '<table>';
    var isHeader = true;
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i].trim();
      // 跳过分隔行 |---|---|
      if (/^\|[\s\-:]+\|$/.test(row) || /^\|(\s*[-:]+[-|\s:]*)\|$/.test(row)) {
        isHeader = false;
        continue;
      }
      var cells = row.split('|').filter(function(c, idx, arr) {
        return idx > 0 && idx < arr.length - 1;
      });
      var tag = (i === 0) ? 'th' : 'td';
      html += '<tr>';
      cells.forEach(function(cell) {
        html += '<' + tag + '>' + cell.trim() + '</' + tag + '>';
      });
      html += '</tr>';
    }
    html += '</table>';
    return html;
  });

  // 段落
  h = h.replace(/\n{2,}/g, '</p><p>');
  h = '<p>' + h + '</p>';
  h = h.replace(/<p><\/p>/g, '');
  // 单换行
  h = h.replace(/([^>])\n([^<])/g, '$1<br>$2');

  // 恢复行内代码占位符
  h = h.replace(/\x00IC(\d+)\x00/g, function(m, i) {
    return inlineCodes[parseInt(i)];
  });
  // 恢复代码块占位符
  h = h.replace(/\x00CB(\d+)\x00/g, function(m, i) {
    return codeBlocks[parseInt(i)];
  });

  return h;
}

// ── 消息 DOM 操作 ──
function scrollToBottom() {
  const m = DOM.messages;
  requestAnimationFrame(() => { m.scrollTop = m.scrollHeight; });
}

function addUserBubble(text) {
  const t = timeStr();
  chatHistory.push({ role: 'user', text: text, time: t });
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div><div class="msg-time">' + t + '</div>';
  DOM.messages.appendChild(div);
  scrollToBottom();
  saveChatHistory();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addTypingIndicator() {
  removeTypingIndicator();
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = '<div class="bubble typing-indicator"><span></span><span></span><span></span></div>';
  DOM.messages.appendChild(div);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = $('typing');
  if (el) el.remove();
}

function updateStreamBubble(text) {
  removeTypingIndicator();
  let el = $('stream-bubble');
  if (!el) {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'stream-bubble';
    div.innerHTML = '<div class="bubble"></div>';
    DOM.messages.appendChild(div);
    el = div;
  }
  el.querySelector('.bubble').innerHTML = renderMd(text) + '<span class="stream-cursor">\u258C</span>';
  scrollToBottom();
}

function finalizeAIMessage(text) {
  removeTypingIndicator();
  const t = timeStr();
  chatHistory.push({ role: 'ai', text: text, time: t });
  let el = $('stream-bubble');
  if (el) {
    el.id = '';
    el.querySelector('.bubble').innerHTML = renderMd(text);
    // 添加时间
    const timeEl = document.createElement('div');
    timeEl.className = 'msg-time';
    timeEl.textContent = t;
    el.appendChild(timeEl);
  } else {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = '<div class="bubble">' + renderMd(text) + '</div><div class="msg-time">' + t + '</div>';
    DOM.messages.appendChild(div);
  }
  scrollToBottom();
  saveChatHistory();
  notifyNewMessage(text);  // D1: 通知

  // 如果上次输入是语音，自动朗读
  if (STATE.lastInputWasVoice && STATE.ttsEnabled) {
    speakText(text);
  }
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.textContent = text;
  DOM.messages.appendChild(div);
  scrollToBottom();
}

function addToolMsg(text) {
  const div = document.createElement('div');
  div.className = 'tool-msg';
  div.textContent = text;
  DOM.messages.appendChild(div);
  scrollToBottom();
}

// ── 发送消息 ──
function sendMessage(text) {
  if (!text.trim() || !STATE.connected) return;
  addUserBubble(text);
  addTypingIndicator();

  const idempKey = uuid();
  STATE.chatRunId = idempKey;
  STATE.chatStream = '';

  request('chat.send', {
    sessionKey: STATE.sessionKey,
    message: text,
    deliver: false,
    idempotencyKey: idempKey
  }).catch(err => {
    removeTypingIndicator();
    addSystemMsg('发送失败: ' + (err.message || err));
  });
}

// TTS 语音合成
function speakText(text) {
  if (!window.speechSynthesis || !STATE.ttsEnabled) return;
  // 去除 Markdown 标记
  const plain = text
    .replace(/```[\s\S]*?```/g, ' 代码块 ')
    .replace(/`[^`]+`/g, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/^[>#*\-]\s*/gm, '')
    .replace(/\n+/g, '。')
    .trim();
  if (!plain) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(plain);
  utter.lang = 'zh-CN';
  utter.rate = 1.1;
  window.speechSynthesis.speak(utter);
}

// ── STT 语音识别 ──
function initSTT() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  const recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    DOM.voiceHint.textContent = final || interim || '听不清，再试一次';
    if (final) {
      stopListening();
      STATE.lastInputWasVoice = true;
      sendMessage(final);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') {
      showToast('麦克风权限被拒绝', 3000);
    } else if (e.error !== 'aborted') {
      DOM.voiceHint.textContent = '识别失败，请重试';
    }
    stopListening();
  };

  recognition.onend = () => {
    if (STATE.isListening) stopListening();
  };

  STATE.recognition = recognition;
  return true;
}

function startListening() {
  if (!STATE.recognition) return;
  STATE.isListening = true;
  DOM.micBtn.classList.add('listening');
  DOM.voiceHint.textContent = '正在听...';
  try { STATE.recognition.start(); } catch(e) {}
}

function stopListening() {
  STATE.isListening = false;
  DOM.micBtn.classList.remove('listening');
  DOM.voiceHint.textContent = '点击开始说话';
  try { STATE.recognition.stop(); } catch(e) {}
}

// ── 模式切换 ──
function setMode(mode) {
  STATE.mode = mode;
  if (mode === 'text') {
    DOM.textRow.style.display = 'flex';
    DOM.voiceRow.style.display = 'none';
    DOM.modeToggle.textContent = '🎤';
    DOM.modeToggle.title = '切换语音';
  } else {
    DOM.textRow.style.display = 'none';
    DOM.voiceRow.style.display = 'flex';
    DOM.modeToggle.textContent = '⌨️';
    DOM.modeToggle.title = '切换文字';
  }
}

// ── 初始化 ──
function init() {
  // 缓存 DOM
  DOM.messages = $('messages');
  DOM.status = $('conn-status');
  DOM.toast = $('toast');
  DOM.msgInput = $('msg-input');
  DOM.sendBtn = $('send-btn');
  DOM.modeToggle = $('mode-toggle');
  DOM.textRow = $('text-input-row');
  DOM.voiceRow = $('voice-input-row');
  DOM.micBtn = $('mic-btn');
  DOM.voiceHint = $('voice-hint');

  // 调试面板：连续点击标题 3 次显示
  let _tapCount = 0, _tapTimer = null;
  const titleEl = $('title-tap');
  if (titleEl) {
    titleEl.addEventListener('click', () => {
      _tapCount++;
      clearTimeout(_tapTimer);
      _tapTimer = setTimeout(() => { _tapCount = 0; }, 600);
      if (_tapCount >= 3) {
        _tapCount = 0;
        const dp = $('debug-panel');
        dp.classList.toggle('hide');
      }
    });
  }

  // 恢复历史聊天记录（从 JSON 结构化数据重建 DOM）
  const savedMsgs = loadChatHistory();
  if (savedMsgs.length > 0 && DOM.messages) {
    savedMsgs.forEach(function(msg) {
      chatHistory.push(msg);
      const div = document.createElement('div');
      if (msg.role === 'user') {
        div.className = 'msg user';
        div.innerHTML = '<div class="bubble">' + escapeHtml(msg.text) + '</div><div class="msg-time">' + (msg.time || '') + '</div>';
      } else {
        div.className = 'msg ai';
        div.innerHTML = '<div class="bubble">' + renderMd(msg.text) + '</div><div class="msg-time">' + (msg.time || '') + '</div>';
      }
      DOM.messages.appendChild(div);
    });
    scrollToBottom();
  }

  // 初始调试信息
  dbg('URL: ' + location.href);
  dbg('Host: ' + location.host);
  dbg('UA: ' + navigator.userAgent.slice(0, 80));

  // 从 URL hash 读取 token
  const hash = location.hash.replace('#', '');
  const params = new URLSearchParams(hash.includes('=') ? hash.replace(/^token=/, 'token=') : '');
  STATE.token = params.get('token') || hash || '';
  dbg('Token: ' + (STATE.token ? STATE.token.slice(0,3) + '***' : 'EMPTY'));
  if (!STATE.token) {
    setStatus('缺少 Token', 'error');
    showToast('URL 中缺少 token 参数', 3000);
    dbg('No token found!', 'err');
    return;
  }

  // 连接
  wsConnect();

  // ── 文本输入事件 ──
  DOM.msgInput.addEventListener('input', () => {
    // 自动调整高度
    DOM.msgInput.style.height = 'auto';
    DOM.msgInput.style.height = Math.min(DOM.msgInput.scrollHeight, 120) + 'px';
    // 启用/禁用发送按钮
    DOM.sendBtn.disabled = !DOM.msgInput.value.trim();
  });

  DOM.sendBtn.addEventListener('click', () => {
    const text = DOM.msgInput.value.trim();
    if (!text) return;
    STATE.lastInputWasVoice = false;
    sendMessage(text);
    DOM.msgInput.value = '';
    DOM.msgInput.style.height = 'auto';
    DOM.sendBtn.disabled = true;
  });

  // 回车发送（Shift+Enter 换行）
  DOM.msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      DOM.sendBtn.click();
    }
  });

  // ── 模式切换按钮 ──
  const hasSTT = initSTT();
  DOM.modeToggle.addEventListener('click', () => {
    if (STATE.mode === 'text') {
      if (!hasSTT) {
        showToast('此浏览器不支持语音识别', 2000);
        return;
      }
      setMode('voice');
    } else {
      if (STATE.isListening) stopListening();
      setMode('text');
    }
  });
  // 初始显示模式按钮图标
  DOM.modeToggle.textContent = '🎤';
  DOM.modeToggle.title = '切换语音';

  // ── 麦克风按钮 ──
  DOM.micBtn.addEventListener('click', () => {
    if (STATE.isListening) {
      stopListening();
    } else {
      startListening();
    }
  });

  // 如果不支持 STT，隐藏模式切换按钮
  if (!hasSTT) {
    DOM.modeToggle.style.display = 'none';
  }

  // ── 初始化新功能 ──
  initSearch();
  initExport();
  initSessionPanel();
  initResourceMonitor();

  // D1: 请求通知权限
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // ── 页面可见性变化处理（iOS 切换 App 后重连） ──
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      dbg('Page visible, checking connection...');
      // 延迟一小段时间让网络恢复
      setTimeout(() => checkAlive(), 300);
    }
  });
  // iOS Safari pageshow 事件（从 bfcache 恢复时触发）
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) {
      dbg('Page restored from cache, reconnecting...');
      setTimeout(() => checkAlive(), 300);
    }
  });
}

document.addEventListener('DOMContentLoaded', init);

// ── B2: 多会话面板 ──
function initSessionPanel() {
  const toggle = $('session-toggle');
  const panel = $('session-panel');
  const list = $('session-list');
  const newBtn = $('new-session-btn');

  function renderSessions() {
    const sessions = getSessions();
    const currentKey = STATE.sessionKey || '';
    list.innerHTML = '';
    // 默认会话
    const defItem = document.createElement('div');
    defItem.className = 'session-item' + (currentKey === '' ? ' active' : '');
    defItem.innerHTML = '<span>\u9ed8\u8ba4\u4f1a\u8bdd</span>';
    defItem.addEventListener('click', () => { switchSession(''); panel.classList.remove('show'); renderSessions(); });
    list.appendChild(defItem);
    // 自定义会话
    sessions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'session-item' + (currentKey === s.key ? ' active' : '');
      const label = document.createElement('span');
      label.textContent = s.name || s.key;
      item.appendChild(label);
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '\u2716';
      del.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('\u5220\u9664\u4f1a\u8bdd "' + (s.name || s.key) + '"?')) {
          localStorage.removeItem(STORAGE_KEY + '_' + s.key);
          saveSessions(sessions.filter(x => x.key !== s.key));
          if (currentKey === s.key) switchSession('');
          renderSessions();
        }
      });
      item.appendChild(del);
      item.addEventListener('click', () => { switchSession(s.key); panel.classList.remove('show'); renderSessions(); });
      list.appendChild(item);
    });
  }

  toggle.addEventListener('click', () => { panel.classList.toggle('show'); renderSessions(); });
  panel.addEventListener('click', e => { if (e.target === panel) panel.classList.remove('show'); });
  newBtn.addEventListener('click', () => {
    const name = prompt('\u8f93\u5165\u4f1a\u8bdd\u540d\u79f0:');
    if (!name) return;
    const key = Date.now().toString(36);
    const sessions = getSessions();
    sessions.push({ key, name });
    saveSessions(sessions);
    switchSession(key);
    panel.classList.remove('show');
  });
}

// ── U5: 搜索功能 ──
function initSearch() {
  const searchToggle = $('search-toggle');
  const searchBar = $('search-bar');
  const searchInput = $('search-input');
  const searchClose = $('search-close');

  searchToggle.addEventListener('click', () => {
    searchBar.classList.toggle('show');
    if (searchBar.classList.contains('show')) {
      searchInput.focus();
    } else {
      searchInput.value = '';
      clearHighlights();
    }
  });
  searchClose.addEventListener('click', () => {
    searchBar.classList.remove('show');
    searchInput.value = '';
    clearHighlights();
  });
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    clearHighlights();
    if (!q) return;
    // A8: 使用 TreeWalker 遍历文本节点，避免 innerHTML 注入破坏 DOM
    const bubbles = DOM.messages.querySelectorAll('.bubble');
    bubbles.forEach(b => {
      const walker = document.createTreeWalker(b, NodeFilter.SHOW_TEXT, null);
      const matches = [];
      let node;
      while ((node = walker.nextNode())) {
        const idx = node.textContent.toLowerCase().indexOf(q);
        if (idx !== -1) matches.push({ node, idx });
      }
      matches.reverse().forEach(({ node, idx }) => {
        const span = document.createElement('span');
        span.className = 'highlight';
        const range = document.createRange();
        range.setStart(node, idx);
        range.setEnd(node, idx + q.length);
        range.surroundContents(span);
      });
      if (matches.length > 0) {
        b.closest('.msg').scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  });
}
function clearHighlights() {
  DOM.messages.querySelectorAll('.highlight').forEach(el => {
    el.replaceWith(document.createTextNode(el.textContent));
  });
}

// ── N3: 导出聊天记录 ──
function initExport() {
  const exportBtn = $('export-btn');
  exportBtn.addEventListener('click', () => {
    if (chatHistory.length === 0) {
      showToast('没有聊天记录可导出', 2000);
      return;
    }
    let md = '# PocketClaw 聊天记录\n\n';
    md += '导出时间: ' + new Date().toLocaleString('zh-CN') + '\n\n---\n\n';
    chatHistory.forEach(msg => {
      const prefix = msg.role === 'user' ? '**👤 我**' : '**🤖 AI**';
      md += prefix + ' (' + (msg.time || '') + ')\n\n' + msg.text + '\n\n---\n\n';
    });
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'PocketClaw_chat_' + new Date().toISOString().slice(0,10) + '.md';
    a.click();
    URL.revokeObjectURL(url);
    showToast('聊天记录已导出', 2000);
  });
}

// ── N4: 多会话支持 ──
const SESSIONS_KEY = 'pocketclaw_sessions';
function getSessions() {
  try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch(e) { return []; }
}
function saveSessions(sessions) {
  try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions)); } catch(e) {}
}
function switchSession(key) {
  // 保存当前会话
  saveChatHistory();
  // 切换 key
  STATE.sessionKey = key;
  // 尝试加载新会话历史
  const sKey = STORAGE_KEY + '_' + key;
  chatHistory.length = 0;
  try {
    const raw = localStorage.getItem(sKey);
    if (raw && raw.charAt(0) === '[') {
      JSON.parse(raw).forEach(m => chatHistory.push(m));
    }
  } catch(e) {}
  // 重新渲染
  DOM.messages.innerHTML = '';
  chatHistory.forEach(msg => {
    const div = document.createElement('div');
    div.className = 'msg ' + msg.role;
    const bubble = msg.role === 'user' ? escapeHtml(msg.text) : renderMd(msg.text);
    div.innerHTML = '<div class="bubble">' + bubble + '</div><div class="msg-time">' + (msg.time || '') + '</div>';
    DOM.messages.appendChild(div);
  });
  scrollToBottom();
  showToast('已切换到会话: ' + key, 1500);
}

// ── N8: 系统资源监控（调试面板扩展）──
function initResourceMonitor() {
  // 每 30 秒更新一次内存信息
  setInterval(() => {
    if (window.performance && performance.memory) {
      const mem = performance.memory;
      const used = (mem.usedJSHeapSize / 1048576).toFixed(1);
      const total = (mem.totalJSHeapSize / 1048576).toFixed(1);
      dbg('MEM: ' + used + '/' + total + ' MB', 'info');
    }
  }, 30000);
}

// 仅在开发模式暴露内部 API（通过 URL 参数 ?dev=1 激活）
if (new URLSearchParams(location.search).has('dev')) {
  window._PC = STATE;
  window._DOM = DOM;
  window._showToast = showToast;
  window._request = request;
  window._sendJSON = sendJSON;
  window._uuid = uuid;
  window._timeStr = timeStr;
}

})();
