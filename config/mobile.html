<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#075E54">
<title>PocketClaw</title>
<style>
/* в”Җв”Җ CSS еҸҳйҮҸ / дё»йўҳ в”Җв”Җ */
:root {
  --bg: #ECE5DD;
  --header-bg: #075E54;
  --header-text: #fff;
  --user-bubble: #DCF8C6;
  --ai-bubble: #fff;
  --text-color: #303030;
  --text-secondary: #667781;
  --input-bg: #fff;
  --input-border: #ccc;
  --send-btn: #075E54;
  --send-btn-active: #128C7E;
  --danger: #e74c3c;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius: 18px;
}

/* в”Җв”Җ е…ЁеұҖйҮҚзҪ® в”Җв”Җ */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 16px;
  color: var(--text-color);
  background: var(--bg);
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

/* в”Җв”Җ йЎөйқўеёғеұҖпјҡheader + messages + input в”Җв”Җ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

/* в”Җв”Җ йЎ¶йғЁеҜјиҲӘж Ҹ в”Җв”Җ */
#header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  padding-top: calc(10px + var(--safe-top));
  background: var(--header-bg);
  color: var(--header-text);
  z-index: 10;
}
#header .title {
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
#header .status {
  font-size: 12px;
  opacity: 0.8;
}
#header .status.connected { color: #25D366; opacity: 1; }
#header .status.error { color: #ff6b6b; opacity: 1; }

/* жЁЎејҸеҲҮжҚўжҢүй’® */
#mode-toggle {
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  font-size: 22px;
  width: 40px; height: 40px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#mode-toggle:active { background: rgba(255,255,255,0.4); }

/* в”Җв”Җ ж¶ҲжҒҜеҢәеҹҹ в”Җв”Җ */
#messages {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 10px;
  padding-bottom: 8px;
  scroll-behavior: smooth;
}

/* ж¶ҲжҒҜе®№еҷЁ */
.msg {
  display: flex;
  margin-bottom: 6px;
  max-width: 85%;
  animation: fadeIn 0.2s ease;
}
.msg.user { margin-left: auto; flex-direction: row-reverse; }
.msg.ai { margin-right: auto; }

/* ж°”жіЎ */
.bubble {
  padding: 8px 12px;
  border-radius: var(--radius);
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
  font-size: 15px;
  position: relative;
  box-shadow: 0 1px 1px rgba(0,0,0,0.08);
}
.msg.user .bubble {
  background: var(--user-bubble);
  border-top-right-radius: 4px;
}
.msg.ai .bubble {
  background: var(--ai-bubble);
  border-top-left-radius: 4px;
}

/* ж°”жіЎеҶ… Markdown */
.bubble p { margin: 0 0 6px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble code {
  background: rgba(0,0,0,0.06);
  padding: 1px 4px;
  border-radius: 4px;
  font-size: 13px;
  font-family: Menlo, Consolas, monospace;
}
.bubble pre {
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 10px;
  border-radius: 8px;
  overflow-x: auto;
  font-size: 13px;
  margin: 6px 0;
  line-height: 1.4;
}
.bubble pre code {
  background: none;
  padding: 0;
  color: inherit;
}
.bubble a { color: #128C7E; text-decoration: underline; }
.bubble ul, .bubble ol { padding-left: 20px; margin: 4px 0; }
.bubble strong { font-weight: 600; }
.bubble em { font-style: italic; }
.bubble blockquote {
  border-left: 3px solid #128C7E;
  padding-left: 10px;
  margin: 6px 0;
  color: var(--text-secondary);
}
.bubble h1, .bubble h2, .bubble h3, .bubble h4 {
  margin: 8px 0 4px;
  font-weight: 600;
  line-height: 1.3;
}
.bubble h1 { font-size: 1.3em; }
.bubble h2 { font-size: 1.2em; }
.bubble h3 { font-size: 1.1em; }
.bubble h4 { font-size: 1.05em; }
.bubble del { text-decoration: line-through; color: var(--text-secondary); }
.bubble hr { border: none; border-top: 1px solid #ddd; margin: 8px 0; }
.bubble table {
  border-collapse: collapse;
  margin: 6px 0;
  font-size: 13px;
  width: 100%;
  overflow-x: auto;
  display: block;
}
.bubble th, .bubble td {
  border: 1px solid #ddd;
  padding: 4px 8px;
  text-align: left;
}
.bubble th {
  background: rgba(0,0,0,0.05);
  font-weight: 600;
}

/* ж—¶й—ҙжҲі */
.msg-time {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
  padding: 0 6px;
  align-self: flex-end;
}

/* зі»з»ҹж¶ҲжҒҜ */
.sys-msg {
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
  background: rgba(0,0,0,0.04);
  padding: 4px 14px;
  border-radius: 12px;
  margin: 8px auto;
  max-width: 80%;
}

/* е·Ҙе…·и°ғз”ЁжҸҗзӨә */
.tool-msg {
  text-align: center;
  font-size: 12px;
  color: #128C7E;
  background: rgba(18,140,126,0.08);
  padding: 4px 14px;
  border-radius: 12px;
  margin: 4px auto;
  max-width: 90%;
}

/* жҖқиҖғдёӯеҠЁз”» */
.typing-indicator {
  display: inline-flex;
  gap: 4px;
  padding: 10px 16px;
}
.typing-indicator span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #999;
  animation: blink 1.4s infinite both;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* в”Җв”Җ иҫ“е…ҘеҢәеҹҹ в”Җв”Җ */
#input-area {
  flex-shrink: 0;
  padding: 8px 10px;
  padding-bottom: calc(8px + var(--safe-bottom));
  background: #F0F0F0;
  border-top: 1px solid #ddd;
}

/* иҫ“е…ҘиЎҢ */
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}

/* ж–Үжң¬иҫ“е…Ҙ */
#msg-input {
  flex: 1;
  border: 1px solid var(--input-border);
  border-radius: 22px;
  padding: 10px 16px;
  font-size: 16px;
  line-height: 1.4;
  resize: none;
  outline: none;
  background: var(--input-bg);
  max-height: 120px;
  font-family: inherit;
  -webkit-appearance: none;
}
#msg-input:focus { border-color: var(--send-btn); }

/* еҸ‘йҖҒжҢүй’® */
#send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--send-btn);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#send-btn:disabled { opacity: 0.4; cursor: default; }
#send-btn:not(:disabled):active { background: var(--send-btn-active); }

/* иҜӯйҹіиҫ“е…ҘиЎҢ */
#voice-input-row {
  justify-content: center;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
}

/* йәҰе…ӢйЈҺжҢүй’® */
#mic-btn {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 3px solid var(--send-btn);
  background: #fff;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#mic-btn.listening {
  background: var(--danger);
  border-color: var(--danger);
  animation: pulse 1.5s infinite;
}
#voice-hint {
  font-size: 13px;
  color: var(--text-secondary);
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
  50% { box-shadow: 0 0 0 12px rgba(231,76,60,0); }
}

/* в”Җв”Җ е·Ҙе…·жҸҗзӨә Toast в”Җв”Җ */
#toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
}
#toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
#debug-panel {
  background: #1a1a2e; color: #0f0; font: 11px/1.4 monospace;
  padding: 8px 12px; max-height: 150px; overflow-y: auto;
  display: block; border-bottom: 2px solid #e94560;
}
#debug-panel.hide { display: none; }
#debug-panel div { word-break: break-all; }
#debug-panel .err { color: #e94560; }
#debug-panel .ok { color: #0f0; }
#debug-panel .info { color: #8af; }

/* в”Җв”Җ U3: жҡ—иүІжЁЎејҸ в”Җв”Җ */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111B21;
    --header-bg: #1F2C33;
    --header-text: #E9EDEF;
    --user-bubble: #005C4B;
    --ai-bubble: #1F2C33;
    --text-color: #E9EDEF;
    --text-secondary: #8696A0;
    --input-bg: #2A3942;
    --input-border: #3B4A54;
    --send-btn: #00A884;
    --send-btn-active: #06CF9C;
  }
  body { background: var(--bg); }
  #input-area { background: #1F2C33; border-top-color: #3B4A54; }
  .bubble pre { background: #0B141A; }
  .bubble th { background: rgba(255,255,255,0.08); }
  .bubble td, .bubble th { border-color: #3B4A54; }
  .sys-msg { background: rgba(255,255,255,0.06); }
  .tool-msg { background: rgba(0,168,132,0.12); color: #06CF9C; }
  #toast { background: rgba(255,255,255,0.85); color: #111; }
}

/* в”Җв”Җ U5: жҗңзҙўж Ҹ в”Җв”Җ */
#search-bar {
  display: none;
  padding: 6px 10px;
  background: var(--header-bg);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
#search-bar.show { display: flex; gap: 8px; align-items: center; }
#search-input {
  flex: 1; border: none; border-radius: 16px;
  padding: 6px 14px; font-size: 14px;
  background: rgba(255,255,255,0.15); color: var(--header-text);
  outline: none;
}
#search-input::placeholder { color: rgba(255,255,255,0.5); }
#search-close {
  background: none; border: none; color: var(--header-text);
  font-size: 18px; cursor: pointer; padding: 4px;
}
.msg .bubble .highlight { background: rgba(255,255,0,0.35); border-radius: 2px; }

/* в”Җв”Җ N3: еҜјеҮә/жҗңзҙўжҢүй’® в”Җв”Җ */
.header-actions { display: flex; gap: 6px; align-items: center; }
.header-btn {
  background: rgba(255,255,255,0.2); border: none; color: #fff;
  font-size: 18px; width: 36px; height: 36px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.header-btn:active { background: rgba(255,255,255,0.4); }

/* в”Җв”Җ B2: еӨҡдјҡиҜқйҖүжӢ©еҷЁ в”Җв”Җ */
#session-panel {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center;
}
#session-panel.show { display: flex; }
#session-dialog {
  background: var(--bg); border-radius: 12px; padding: 16px; width: 280px;
  max-height: 60vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
#session-dialog h3 { margin: 0 0 12px; font-size: 16px; }
.session-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 6px;
  background: rgba(128,128,128,0.1); transition: background 0.15s;
}
.session-item:hover, .session-item.active { background: rgba(0,168,132,0.2); }
.session-item .del-btn {
  background: none; border: none; color: #f44; font-size: 14px; cursor: pointer;
  padding: 2px 6px; border-radius: 4px;
}
.session-item .del-btn:hover { background: rgba(255,68,68,0.15); }
#new-session-btn {
  width: 100%; padding: 10px; border: 1px dashed rgba(128,128,128,0.4);
  background: none; color: var(--text); border-radius: 8px; cursor: pointer;
  font-size: 14px; margin-top: 4px;
}
#new-session-btn:hover { background: rgba(128,128,128,0.1); }

/* в”Җв”Җ D4: д»Јз Ғеқ—еӨҚеҲ¶жҢүй’® в”Җв”Җ */
.code-block { position: relative; margin: 8px 0; }
.code-block pre { margin: 0; }
.code-lang {
  position: absolute; top: 4px; left: 10px; font-size: 11px;
  color: rgba(255,255,255,0.45); font-family: monospace; text-transform: uppercase;
}
.code-copy {
  position: absolute; top: 4px; right: 6px; background: rgba(255,255,255,0.15);
  border: none; color: #fff; font-size: 14px; padding: 2px 6px; border-radius: 4px;
  cursor: pointer; opacity: 0.5; transition: opacity 0.15s;
}
.code-block:hover .code-copy { opacity: 1; }
.code-copy:active { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="app">
  <!-- йЎ¶йғЁж Ҹ -->
  <div id="header">
    <div>
      <div class="title" id="title-tap">рҹӨ– PocketClaw</div>
      <div class="status" id="conn-status">иҝһжҺҘдёӯ...</div>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="session-toggle" title="еҲҮжҚўдјҡиҜқ">рҹ“Ӣ</button>
      <button class="header-btn" id="search-toggle" title="жҗңзҙўж¶ҲжҒҜ">рҹ”Қ</button>
      <button class="header-btn" id="export-btn" title="еҜјеҮәиҒҠеӨ©и®°еҪ•">рҹ’ҫ</button>
      <button id="mode-toggle" title="еҲҮжҚўж–Үеӯ—/иҜӯйҹі">вҢЁпёҸ</button>
    </div>
  </div>

  <!-- B2: еӨҡдјҡиҜқйқўжқҝ -->
  <div id="session-panel">
    <div id="session-dialog">
      <h3>рҹ’¬ дјҡиҜқз®ЎзҗҶ</h3>
      <div id="session-list"></div>
      <button id="new-session-btn">+ ж–°е»әдјҡиҜқ</button>
    </div>
  </div>

  <!-- U5: жҗңзҙўж Ҹ -->
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="жҗңзҙўж¶ҲжҒҜ..." autocomplete="off">
    <button id="search-close">вң–</button>
  </div>

  <!-- и°ғиҜ•йқўжқҝпјҲзӮ№еҮ»ж Үйўҳ 3 ж¬ЎжҳҫзӨәпјү -->
  <div id="debug-panel" class="hide"></div>

  <!-- ж¶ҲжҒҜеҲ—иЎЁ -->
  <div id="messages"></div>

  <!-- иҫ“е…ҘеҢә -->
  <div id="input-area">
    <!-- ж–Үжң¬жЁЎејҸ -->
    <div id="text-input-row" class="input-row">
      <textarea id="msg-input" rows="1" placeholder="иҫ“е…Ҙж¶ҲжҒҜ..." autocomplete="off"></textarea>
      <button id="send-btn" disabled>вһӨ</button>
    </div>
    <!-- иҜӯйҹіжЁЎејҸ -->
    <div id="voice-input-row" class="input-row" style="display:none;">
      <button id="mic-btn">рҹҺӨ</button>
      <span id="voice-hint">зӮ№еҮ»ејҖе§ӢиҜҙиҜқ</span>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- зӢ¬з«Ӣи°ғиҜ•и„ҡжң¬пјҲеҚідҪҝдё»и„ҡжң¬жңүиҜӯжі•й”ҷиҜҜд№ҹиғҪе·ҘдҪңпјү -->
<script>
(function(){
  var panel = document.getElementById('debug-panel');
  var logs = [];
  window._dbg = function(msg, cls) {
    var ts = new Date().toLocaleTimeString('zh-CN', {hour12:false});
    logs.push({ts:ts, msg:msg, cls:cls||'info'});
    if (logs.length > 80) logs.shift();
    if (panel) {
      var d = document.createElement('div');
      d.className = cls || 'info';
      d.textContent = ts + ' ' + msg;
      panel.appendChild(d);
      panel.scrollTop = panel.scrollHeight;
    }
  };
  window.onerror = function(msg, src, line, col) {
    window._dbg('JS ERROR: ' + msg + ' @L' + line + ':' + col, 'err');
  };
  window.addEventListener('unhandledrejection', function(e) {
    window._dbg('PROMISE: ' + (e.reason && e.reason.message || e.reason), 'err');
  });
  window._dbg('Debug panel ready');

  // е»¶иҝҹжЈҖжҹҘдё»и„ҡжң¬жҳҜеҗҰеҠ иҪҪжҲҗеҠҹ
  setTimeout(function() {
    if (!window._PC) {
      window._dbg('MAIN SCRIPT NOT LOADED!', 'err');
      window._dbg('UA: ' + navigator.userAgent, 'info');
      window._dbg('URL: ' + location.href, 'info');
      window._dbg('Hash: ' + location.hash, 'info');
      // и®°еҪ•еҹәжң¬дҝЎжҒҜдҫҝдәҺиҝңзЁӢи°ғиҜ•
    } else {
      window._dbg('Main script loaded OK', 'ok');
    }
  }, 1500);
})();
</script>

<script>
/* в”Җв”Җ PocketClaw Mobile Client в”Җв”Җ */
(function() {
'use strict';

var dbg = window._dbg || function(){};

// в”Җв”Җ е…ЁеұҖзҠ¶жҖҒ в”Җв”Җ
const STATE = {
  ws: null,
  connected: false,
  token: '',
  connectNonce: '',
  connectSent: false,
  connectTimer: null,
  sessionKey: 'main',
  chatRunId: null,
  chatStream: '',
  pending: new Map(),    // id -> {resolve, reject}
  mode: 'text',          // 'text' | 'voice'
  lastInputWasVoice: false,
  ttsEnabled: true,
  isListening: false,
  recognition: null,
  reconnectTimer: null,
  backoffMs: 800,
};

// в”Җв”Җ DOM зј“еӯҳ в”Җв”Җ
const $ = id => document.getElementById(id);
const DOM = {};

// в”Җв”Җ иҒҠеӨ©и®°еҪ•жҢҒд№…еҢ–пјҲJSON з»“жһ„еҢ–еӯҳеӮЁпјү в”Җв”Җ
const STORAGE_KEY = 'pocketclaw_chat_history';
const CHAT_MAX_MESSAGES = 200;
const chatHistory = [];

function saveChatHistory() {
  try {
    // йҷҗеҲ¶жңҖеӨ§ж¶ҲжҒҜж•°пјҢйҒҝе…Қ localStorage жәўеҮә
    while (chatHistory.length > CHAT_MAX_MESSAGES) chatHistory.shift();
    // A4: ж №жҚ®еҪ“еүҚдјҡиҜқдҪҝз”ЁдёҚеҗҢ key
    const key = STATE.sessionKey ? STORAGE_KEY + '_' + STATE.sessionKey : STORAGE_KEY;
    localStorage.setItem(key, JSON.stringify(chatHistory));
  } catch(e) {}
}
function loadChatHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    // е…је®№ж—§зүҲ innerHTML ж јејҸпјҡеҰӮжһңдёҚжҳҜ JSON ж•°з»„пјҢдёўејғж—§ж•°жҚ®
    if (raw.charAt(0) !== '[') {
      localStorage.removeItem(STORAGE_KEY);
      return [];
    }
    return JSON.parse(raw);
  } catch(e) { return []; }
}
function clearChatHistory() {
  chatHistory.length = 0;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// в”Җв”Җ е·Ҙе…·еҮҪж•° в”Җв”Җ
function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function showToast(msg, ms) {
  const t = DOM.toast;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms || 2000);
}

function setStatus(text, cls) {
  DOM.status.textContent = text;
  DOM.status.className = 'status' + (cls ? ' ' + cls : '');
}

function timeStr() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

// в”Җв”Җ WebSocket иҝһжҺҘ в”Җв”Җ
function wsConnect() {
  if (STATE.ws) { try { STATE.ws.close(); } catch(e){} }
  clearTimeout(STATE.reconnectTimer);
  clearTimeout(STATE.connectTimer);
  STATE.connectSent = false;
  STATE.connectNonce = null;

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = proto + '//' + location.host;
  setStatus('иҝһжҺҘдёӯ...', '');
  dbg('WS connecting вҶ’ ' + url);

  let ws;
  try {
    ws = new WebSocket(url);
  } catch(e) {
    dbg('WS constructor error: ' + e.message, 'err');
    setStatus('иҝһжҺҘеӨұиҙҘ', 'error');
    scheduleReconnect();
    return;
  }
  STATE.ws = ws;

  ws.onopen = () => {
    dbg('WS opened!', 'ok');
    STATE.backoffMs = 800;
    // зӯүеҫ… connect.challenge дәӢд»¶еҶҚеҸ‘йҖҒ connectпјҲеҢ№й…Қе®ҳж–№ control-ui иЎҢдёәпјү
    // и®ҫзҪ® 750ms е…ңеә•е®ҡж—¶еҷЁпјҢиӢҘ challenge жңӘеҲ°еҲҷзӣҙжҺҘиҝһжҺҘ
    STATE.connectTimer = setTimeout(() => {
      if (!STATE.connectSent) {
        dbg('challenge timeout, sending connect directly');
        sendConnect();
      }
    }, 750);
  };

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }
    if (msg.type === 'event' && msg.event === 'connect.challenge') {
      dbg('Got challenge nonce=' + (msg.payload && msg.payload.nonce || '?').slice(0,8));
    }
    handleMessage(msg);
  };

  ws.onclose = (evt) => {
    STATE.connected = false;
    clearTimeout(STATE.connectTimer);
    dbg('WS closed code=' + evt.code + ' reason=' + (evt.reason || 'n/a'), 'err');
    setStatus('е·Іж–ӯејҖ', 'error');
    scheduleReconnect();
  };

  ws.onerror = (evt) => {
    STATE.connected = false;
    dbg('WS error event fired', 'err');
    setStatus('иҝһжҺҘеӨұиҙҘ', 'error');
  };
}

function scheduleReconnect() {
  clearTimeout(STATE.reconnectTimer);
  STATE.reconnectTimer = setTimeout(() => {
    wsConnect();
  }, STATE.backoffMs);
  STATE.backoffMs = Math.min(STATE.backoffMs * 1.5, 15000);
}

// жЈҖжөӢиҝһжҺҘжҳҜеҗҰеӯҳжҙ»
function checkAlive() {
  if (!STATE.ws || STATE.ws.readyState !== WebSocket.OPEN) {
    dbg('Connection dead, reconnecting...', 'err');
    STATE.connected = false;
    setStatus('йҮҚиҝһдёӯ...', '');
    wsConnect();
    return;
  }
  // еҸ‘йҖҒ health ping жЈҖжөӢ
  try {
    request('health', {}).then(() => {
      dbg('Health OK', 'ok');
    }).catch(() => {
      dbg('Health failed, reconnecting...', 'err');
      STATE.connected = false;
      wsConnect();
    });
  } catch(e) {
    wsConnect();
  }
}

function sendJSON(obj) {
  if (STATE.ws && STATE.ws.readyState === WebSocket.OPEN) {
    STATE.ws.send(JSON.stringify(obj));
  }
}

// еҸ‘йҖҒ RPC иҜ·жұӮпјҢиҝ”еӣһ Promise
function request(method, params) {
  return new Promise((resolve, reject) => {
    const id = uuid();
    STATE.pending.set(id, { resolve, reject, method });
    sendJSON({ type: 'req', id, method, params: params || {} });
    // и¶…ж—¶ 30s
    setTimeout(() => {
      if (STATE.pending.has(id)) {
        STATE.pending.delete(id);
        reject(new Error('Request timeout'));
      }
    }, 30000);
  });
}

// еҸ‘йҖҒ connect иҜ·жұӮ
function sendConnect() {
  if (STATE.connectSent) return;
  STATE.connectSent = true;
  clearTimeout(STATE.connectTimer);
  const params = {
    minProtocol: 3,
    maxProtocol: 3,
    client: {
      id: 'webchat-ui',
      version: '1.0',
      platform: 'mobile-web',
      mode: 'webchat'
    },
    role: 'operator',
    scopes: ['operator.admin'],
    caps: [],
    auth: { token: STATE.token },
    userAgent: navigator.userAgent,
    locale: navigator.language || 'zh-CN'
  };
  request('connect', params).then(res => {
    STATE.connected = true;
    setStatus('е·ІиҝһжҺҘ', 'connected');
    dbg('Connected OK!', 'ok');
  }).catch(err => {
    setStatus('и®ӨиҜҒеӨұиҙҘ', 'error');
    dbg('Connect failed: ' + (err.message || JSON.stringify(err)), 'err');
    showToast('и®ӨиҜҒеӨұиҙҘ: ' + (err.message || err));
  });
}

// в”Җв”Җ ж¶ҲжҒҜеҲҶеҸ‘ в”Җв”Җ
function handleMessage(msg) {
  // е“Қеә”
  if (msg.type === 'res') {
    const p = STATE.pending.get(msg.id);
    if (p) {
      STATE.pending.delete(msg.id);
      if (msg.ok) p.resolve(msg.payload);
      else p.reject(msg.error || { message: 'Unknown error' });
    }
    return;
  }
  // дәӢд»¶
  if (msg.type === 'event') {
    handleEvent(msg);
  }
}

function handleEvent(msg) {
  const evt = msg.event;
  const payload = msg.payload;

  // connect.challenge вҶ’ ж”¶еҲ° nonce еҗҺеҸ‘йҖҒ connect
  if (evt === 'connect.challenge') {
    const nonce = payload && payload.nonce;
    if (nonce) {
      STATE.connectNonce = nonce;
      STATE.connectSent = false;   // е…Ғи®ёпјҲйҮҚж–°пјүи®ӨиҜҒ
      clearTimeout(STATE.connectTimer);
      sendConnect();
    }
    return;
  }

  // chat дәӢд»¶пјҲеӯҗжӯҘйӘӨ 4 е®һзҺ°еӨ„зҗҶйҖ»иҫ‘пјү
  if (evt === 'chat') {
    handleChatEvent(payload);
    return;
  }

  // exec.approval.requested вҶ’ иҮӘеҠЁжү№еҮҶпјҲеӯҗжӯҘйӘӨ 5 е®һзҺ°пјү
  if (evt === 'exec.approval.requested') {
    handleApproval(payload);
    return;
  }
}

function handleChatEvent(payload) {
  if (!payload) return;
  // sessionKey еҸҜиғҪжҳҜ 'agent:main:main' зӯүж јејҸпјҢеҸӘиҰҒеҢ…еҗ«жҲ‘д»¬зҡ„ key еҚіеҸҜ
  var sk = payload.sessionKey || '';
  if (sk !== STATE.sessionKey && sk.indexOf(STATE.sessionKey) === -1) return;
  const state = payload.state;
  const msgData = payload.message;

  if (state === 'delta') {
    // delta еҢ…еҗ«е®Ңж•ҙзҙҜз§Ҝж–Үжң¬
    const text = extractText(msgData);
    if (typeof text === 'string') {
      STATE.chatStream = text;
      updateStreamBubble(text);
    }
  } else if (state === 'final') {
    const text = extractText(msgData);
    if (text !== null) {
      finalizeAIMessage(text || STATE.chatStream || '');
    }
    STATE.chatStream = '';
    STATE.chatRunId = null;
    removeTypingIndicator();
  } else if (state === 'aborted') {
    const text = extractText(msgData) || STATE.chatStream || '';
    if (text.trim()) finalizeAIMessage(text);
    STATE.chatStream = '';
    STATE.chatRunId = null;
    removeTypingIndicator();
  }
}

function handleApproval(payload) {
  // иҮӘеҠЁжү№еҮҶжүҖжңүе·Ҙе…·и°ғз”Ё
  if (!payload || !payload.id) return;
  const desc = payload.description || payload.tool || 'е·Ҙе…·и°ғз”Ё';
  addToolMsg('рҹ”§ ' + desc);
  request('exec.approval.resolve', { id: payload.id, decision: 'approve' }).catch(() => {});
}

// в”Җв”Җ ж–Үжң¬жҸҗеҸ– в”Җв”Җ
function extractText(msg) {
  if (!msg) return null;
  const content = msg.content;
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) {
    const parts = content.filter(p => p && p.type === 'text').map(p => p.text || '');
    return parts.join('\n');
  }
  return null;
}

// в”Җв”Җ Markdown жёІжҹ“пјҲQ3: еўһејәзүҲ + XSS е®үе…ЁеҠ еӣәпјү в”Җв”Җ

// D4: еӨҚеҲ¶д»Јз Ғеқ—еҶ…е®№
function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code');
  if (!code) return;
  navigator.clipboard.writeText(code.textContent).then(() => {
    btn.textContent = '\u2705';
    setTimeout(() => { btn.textContent = '\u{1f4cb}'; }, 1500);
  }).catch(() => {
    // fallback for non-HTTPS
    const ta = document.createElement('textarea');
    ta.value = code.textContent;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '\u2705';
    setTimeout(() => { btn.textContent = '\u{1f4cb}'; }, 1500);
  });
}

// D1: йҖҡзҹҘ APIпјҲж ҮзӯҫйЎөеӨұз„Ұж—¶ж–°ж¶ҲжҒҜйҖҡзҹҘпјү
function notifyNewMessage(text) {
  if (document.visibilityState !== 'hidden') return;
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    const n = new Notification('PocketClaw', {
      body: (text || '').slice(0, 100),
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">рҹӨ–</text></svg>',
      tag: 'pocketclaw-msg'
    });
    setTimeout(() => n.close(), 5000);
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

function renderMd(text) {
  if (!text) return '';

  // жҸҗеҸ–д»Јз Ғеқ—пјҢйҳІжӯўеҶ…йғЁеҶ…е®№иў« Markdown еӨ„зҗҶ
  var codeBlocks = [];
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    var escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var langLabel = lang ? '<span class="code-lang">' + lang + '</span>' : '';
    // D4: ж·»еҠ еӨҚеҲ¶жҢүй’®
    codeBlocks.push('<div class="code-block">' + langLabel + '<button class="code-copy" onclick="copyCode(this)">\u{1f4cb}</button><pre><code>' + escaped + '</code></pre></div>');
    return '\x00CB' + (codeBlocks.length - 1) + '\x00';
  });

  // жҸҗеҸ–иЎҢеҶ…д»Јз Ғ
  var inlineCodes = [];
  text = text.replace(/`([^`]+)`/g, function(m, code) {
    inlineCodes.push('<code>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code>');
    return '\x00IC' + (inlineCodes.length - 1) + '\x00';
  });

  var h = text
    // иҪ¬д№ү HTMLпјҲд»Јз Ғеқ—/иЎҢеҶ…д»Јз Ғе·ІжҸҗеҸ–пјҢдёҚеҸ—еҪұе“Қпјү
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // ж ҮйўҳпјҲh1-h4пјү
    .replace(/^####\s+(.+)$/gm, '<h4>$1</h4>')
    .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
    // ж°ҙе№іеҲҶйҡ”зәҝ
    .replace(/^[-*_]{3,}\s*$/gm, '<hr>')
    // зІ—дҪ“
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // ж–ңдҪ“
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // еҲ йҷӨзәҝ
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    // й“ҫжҺҘпјҲXSS йҳІжҠӨ: д»…е…Ғи®ё http/https еҚҸи®®пјҢsanitizeеұһжҖ§пјү
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(m, text, url) {
      url = url.replace(/["'<>]/g, '');  // Q3: йўқеӨ–XSSжё…зҗҶ
      if (/^https?:\/\//i.test(url)) {
        return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + text + '</a>';
      }
      return text;
    });

  // D5: иҮӘеҠЁиҜҶеҲ«иЈё URL е№¶еҸҳдёәеҸҜзӮ№еҮ»й“ҫжҺҘпјҲжҺ’йҷӨе·Іиў« <a> еҢ…иЈ№зҡ„пјү
  h = h.replace(/(?<![="'>])(https?:\/\/[^\s<,;)}\]]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
    // еј•з”Ё
    .replace(/^&gt;\s?(.+)$/gm, '<blockquote>$1</blockquote>')
    // ж— еәҸеҲ—иЎЁ
    .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
    // жңүеәҸеҲ—иЎЁ
    .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

  // еҢ…иЈ№иҝһз»ӯ li
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // з®Җжҳ“иЎЁж јж”ҜжҢҒ
  h = h.replace(/((?:^\|.+\|\s*\n)+)/gm, function(tableBlock) {
    var rows = tableBlock.trim().split('\n');
    var html = '<table>';
    var isHeader = true;
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i].trim();
      // и·іиҝҮеҲҶйҡ”иЎҢ |---|---|
      if (/^\|[\s\-:]+\|$/.test(row) || /^\|(\s*[-:]+[-|\s:]*)\|$/.test(row)) {
        isHeader = false;
        continue;
      }
      var cells = row.split('|').filter(function(c, idx, arr) {
        return idx > 0 && idx < arr.length - 1;
      });
      var tag = (i === 0) ? 'th' : 'td';
      html += '<tr>';
      cells.forEach(function(cell) {
        html += '<' + tag + '>' + cell.trim() + '</' + tag + '>';
      });
      html += '</tr>';
    }
    html += '</table>';
    return html;
  });

  // ж®өиҗҪ
  h = h.replace(/\n{2,}/g, '</p><p>');
  h = '<p>' + h + '</p>';
  h = h.replace(/<p><\/p>/g, '');
  // еҚ•жҚўиЎҢ
  h = h.replace(/([^>])\n([^<])/g, '$1<br>$2');

  // жҒўеӨҚиЎҢеҶ…д»Јз ҒеҚ дҪҚз¬Ұ
  h = h.replace(/\x00IC(\d+)\x00/g, function(m, i) {
    return inlineCodes[parseInt(i)];
  });
  // жҒўеӨҚд»Јз Ғеқ—еҚ дҪҚз¬Ұ
  h = h.replace(/\x00CB(\d+)\x00/g, function(m, i) {
    return codeBlocks[parseInt(i)];
  });

  return h;
}

// в”Җв”Җ ж¶ҲжҒҜ DOM ж“ҚдҪң в”Җв”Җ
function scrollToBottom() {
  const m = DOM.messages;
  requestAnimationFrame(() => { m.scrollTop = m.scrollHeight; });
}

function addUserBubble(text) {
  const t = timeStr();
  chatHistory.push({ role: 'user', text: text, time: t });
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div><div class="msg-time">' + t + '</div>';
  DOM.messages.appendChild(div);
  scrollToBottom();
  saveChatHistory();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addTypingIndicator() {
  removeTypingIndicator();
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = '<div class="bubble typing-indicator"><span></span><span></span><span></span></div>';
  DOM.messages.appendChild(div);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = $('typing');
  if (el) el.remove();
}

function updateStreamBubble(text) {
  removeTypingIndicator();
  let el = $('stream-bubble');
  if (!el) {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'stream-bubble';
    div.innerHTML = '<div class="bubble"></div>';
    DOM.messages.appendChild(div);
    el = div;
  }
  el.querySelector('.bubble').innerHTML = renderMd(text);
  scrollToBottom();
}

function finalizeAIMessage(text) {
  removeTypingIndicator();
  const t = timeStr();
  chatHistory.push({ role: 'ai', text: text, time: t });
  let el = $('stream-bubble');
  if (el) {
    el.id = '';
    el.querySelector('.bubble').innerHTML = renderMd(text);
    // ж·»еҠ ж—¶й—ҙ
    const timeEl = document.createElement('div');
    timeEl.className = 'msg-time';
    timeEl.textContent = t;
    el.appendChild(timeEl);
  } else {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = '<div class="bubble">' + renderMd(text) + '</div><div class="msg-time">' + t + '</div>';
    DOM.messages.appendChild(div);
  }
  scrollToBottom();
  saveChatHistory();
  notifyNewMessage(text);  // D1: йҖҡзҹҘ

  // еҰӮжһңдёҠж¬Ўиҫ“е…ҘжҳҜиҜӯйҹіпјҢиҮӘеҠЁжң—иҜ»
  if (STATE.lastInputWasVoice && STATE.ttsEnabled) {
    speakText(text);
  }
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.textContent = text;
  DOM.messages.appendChild(div);
  scrollToBottom();
}

function addToolMsg(text) {
  const div = document.createElement('div');
  div.className = 'tool-msg';
  div.textContent = text;
  DOM.messages.appendChild(div);
  scrollToBottom();
}

// в”Җв”Җ еҸ‘йҖҒж¶ҲжҒҜ в”Җв”Җ
function sendMessage(text) {
  if (!text.trim() || !STATE.connected) return;
  addUserBubble(text);
  addTypingIndicator();

  const idempKey = uuid();
  STATE.chatRunId = idempKey;
  STATE.chatStream = '';

  request('chat.send', {
    sessionKey: STATE.sessionKey,
    message: text,
    deliver: false,
    idempotencyKey: idempKey
  }).catch(err => {
    removeTypingIndicator();
    addSystemMsg('еҸ‘йҖҒеӨұиҙҘ: ' + (err.message || err));
  });
}

// TTS иҜӯйҹіеҗҲжҲҗ
function speakText(text) {
  if (!window.speechSynthesis || !STATE.ttsEnabled) return;
  // еҺ»йҷӨ Markdown ж Үи®°
  const plain = text
    .replace(/```[\s\S]*?```/g, ' д»Јз Ғеқ— ')
    .replace(/`[^`]+`/g, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/^[>#*\-]\s*/gm, '')
    .replace(/\n+/g, 'гҖӮ')
    .trim();
  if (!plain) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(plain);
  utter.lang = 'zh-CN';
  utter.rate = 1.1;
  window.speechSynthesis.speak(utter);
}

// в”Җв”Җ STT иҜӯйҹіиҜҶеҲ« в”Җв”Җ
function initSTT() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  const recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    DOM.voiceHint.textContent = final || interim || 'еҗ¬дёҚжё…пјҢеҶҚиҜ•дёҖж¬Ў';
    if (final) {
      stopListening();
      STATE.lastInputWasVoice = true;
      sendMessage(final);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') {
      showToast('йәҰе…ӢйЈҺжқғйҷҗиў«жӢ’з»қ', 3000);
    } else if (e.error !== 'aborted') {
      DOM.voiceHint.textContent = 'иҜҶеҲ«еӨұиҙҘпјҢиҜ·йҮҚиҜ•';
    }
    stopListening();
  };

  recognition.onend = () => {
    if (STATE.isListening) stopListening();
  };

  STATE.recognition = recognition;
  return true;
}

function startListening() {
  if (!STATE.recognition) return;
  STATE.isListening = true;
  DOM.micBtn.classList.add('listening');
  DOM.voiceHint.textContent = 'жӯЈеңЁеҗ¬...';
  try { STATE.recognition.start(); } catch(e) {}
}

function stopListening() {
  STATE.isListening = false;
  DOM.micBtn.classList.remove('listening');
  DOM.voiceHint.textContent = 'зӮ№еҮ»ејҖе§ӢиҜҙиҜқ';
  try { STATE.recognition.stop(); } catch(e) {}
}

// в”Җв”Җ жЁЎејҸеҲҮжҚў в”Җв”Җ
function setMode(mode) {
  STATE.mode = mode;
  if (mode === 'text') {
    DOM.textRow.style.display = 'flex';
    DOM.voiceRow.style.display = 'none';
    DOM.modeToggle.textContent = 'рҹҺӨ';
    DOM.modeToggle.title = 'еҲҮжҚўиҜӯйҹі';
  } else {
    DOM.textRow.style.display = 'none';
    DOM.voiceRow.style.display = 'flex';
    DOM.modeToggle.textContent = 'вҢЁпёҸ';
    DOM.modeToggle.title = 'еҲҮжҚўж–Үеӯ—';
  }
}

// в”Җв”Җ еҲқе§ӢеҢ– в”Җв”Җ
function init() {
  // зј“еӯҳ DOM
  DOM.messages = $('messages');
  DOM.status = $('conn-status');
  DOM.toast = $('toast');
  DOM.msgInput = $('msg-input');
  DOM.sendBtn = $('send-btn');
  DOM.modeToggle = $('mode-toggle');
  DOM.textRow = $('text-input-row');
  DOM.voiceRow = $('voice-input-row');
  DOM.micBtn = $('mic-btn');
  DOM.voiceHint = $('voice-hint');

  // и°ғиҜ•йқўжқҝпјҡиҝһз»ӯзӮ№еҮ»ж Үйўҳ 3 ж¬ЎжҳҫзӨә
  let _tapCount = 0, _tapTimer = null;
  const titleEl = $('title-tap');
  if (titleEl) {
    titleEl.addEventListener('click', () => {
      _tapCount++;
      clearTimeout(_tapTimer);
      _tapTimer = setTimeout(() => { _tapCount = 0; }, 600);
      if (_tapCount >= 3) {
        _tapCount = 0;
        const dp = $('debug-panel');
        dp.classList.toggle('hide');
      }
    });
  }

  // жҒўеӨҚеҺҶеҸІиҒҠеӨ©и®°еҪ•пјҲд»Һ JSON з»“жһ„еҢ–ж•°жҚ®йҮҚе»ә DOMпјү
  const savedMsgs = loadChatHistory();
  if (savedMsgs.length > 0 && DOM.messages) {
    savedMsgs.forEach(function(msg) {
      chatHistory.push(msg);
      const div = document.createElement('div');
      if (msg.role === 'user') {
        div.className = 'msg user';
        div.innerHTML = '<div class="bubble">' + escapeHtml(msg.text) + '</div><div class="msg-time">' + (msg.time || '') + '</div>';
      } else {
        div.className = 'msg ai';
        div.innerHTML = '<div class="bubble">' + renderMd(msg.text) + '</div><div class="msg-time">' + (msg.time || '') + '</div>';
      }
      DOM.messages.appendChild(div);
    });
    scrollToBottom();
  }

  // еҲқе§Ӣи°ғиҜ•дҝЎжҒҜ
  dbg('URL: ' + location.href);
  dbg('Host: ' + location.host);
  dbg('UA: ' + navigator.userAgent.slice(0, 80));

  // д»Һ URL hash иҜ»еҸ– token
  const hash = location.hash.replace('#', '');
  const params = new URLSearchParams(hash.includes('=') ? hash.replace(/^token=/, 'token=') : '');
  STATE.token = params.get('token') || hash || '';
  dbg('Token: ' + (STATE.token ? STATE.token.slice(0,3) + '***' : 'EMPTY'));
  if (!STATE.token) {
    setStatus('зјәе°‘ Token', 'error');
    showToast('URL дёӯзјәе°‘ token еҸӮж•°', 3000);
    dbg('No token found!', 'err');
    return;
  }

  // иҝһжҺҘ
  wsConnect();

  // в”Җв”Җ ж–Үжң¬иҫ“е…ҘдәӢд»¶ в”Җв”Җ
  DOM.msgInput.addEventListener('input', () => {
    // иҮӘеҠЁи°ғж•ҙй«ҳеәҰ
    DOM.msgInput.style.height = 'auto';
    DOM.msgInput.style.height = Math.min(DOM.msgInput.scrollHeight, 120) + 'px';
    // еҗҜз”Ё/зҰҒз”ЁеҸ‘йҖҒжҢүй’®
    DOM.sendBtn.disabled = !DOM.msgInput.value.trim();
  });

  DOM.sendBtn.addEventListener('click', () => {
    const text = DOM.msgInput.value.trim();
    if (!text) return;
    STATE.lastInputWasVoice = false;
    sendMessage(text);
    DOM.msgInput.value = '';
    DOM.msgInput.style.height = 'auto';
    DOM.sendBtn.disabled = true;
  });

  // еӣһиҪҰеҸ‘йҖҒпјҲShift+Enter жҚўиЎҢпјү
  DOM.msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      DOM.sendBtn.click();
    }
  });

  // в”Җв”Җ жЁЎејҸеҲҮжҚўжҢүй’® в”Җв”Җ
  const hasSTT = initSTT();
  DOM.modeToggle.addEventListener('click', () => {
    if (STATE.mode === 'text') {
      if (!hasSTT) {
        showToast('жӯӨжөҸи§ҲеҷЁдёҚж”ҜжҢҒиҜӯйҹіиҜҶеҲ«', 2000);
        return;
      }
      setMode('voice');
    } else {
      if (STATE.isListening) stopListening();
      setMode('text');
    }
  });
  // еҲқе§ӢжҳҫзӨәжЁЎејҸжҢүй’®еӣҫж Ү
  DOM.modeToggle.textContent = 'рҹҺӨ';
  DOM.modeToggle.title = 'еҲҮжҚўиҜӯйҹі';

  // в”Җв”Җ йәҰе…ӢйЈҺжҢүй’® в”Җв”Җ
  DOM.micBtn.addEventListener('click', () => {
    if (STATE.isListening) {
      stopListening();
    } else {
      startListening();
    }
  });

  // еҰӮжһңдёҚж”ҜжҢҒ STTпјҢйҡҗи—ҸжЁЎејҸеҲҮжҚўжҢүй’®
  if (!hasSTT) {
    DOM.modeToggle.style.display = 'none';
  }

  // в”Җв”Җ еҲқе§ӢеҢ–ж–°еҠҹиғҪ в”Җв”Җ
  initSearch();
  initExport();
  initSessionPanel();
  initResourceMonitor();

  // D1: иҜ·жұӮйҖҡзҹҘжқғйҷҗ
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // в”Җв”Җ йЎөйқўеҸҜи§ҒжҖ§еҸҳеҢ–еӨ„зҗҶпјҲiOS еҲҮжҚў App еҗҺйҮҚиҝһпјү в”Җв”Җ
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      dbg('Page visible, checking connection...');
      // е»¶иҝҹдёҖе°Ҹж®өж—¶й—ҙи®©зҪ‘з»ңжҒўеӨҚ
      setTimeout(() => checkAlive(), 300);
    }
  });
  // iOS Safari pageshow дәӢд»¶пјҲд»Һ bfcache жҒўеӨҚж—¶и§ҰеҸ‘пјү
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) {
      dbg('Page restored from cache, reconnecting...');
      setTimeout(() => checkAlive(), 300);
    }
  });
}

document.addEventListener('DOMContentLoaded', init);

// в”Җв”Җ B2: еӨҡдјҡиҜқйқўжқҝ в”Җв”Җ
function initSessionPanel() {
  const toggle = $('session-toggle');
  const panel = $('session-panel');
  const list = $('session-list');
  const newBtn = $('new-session-btn');

  function renderSessions() {
    const sessions = getSessions();
    const currentKey = STATE.sessionKey || '';
    list.innerHTML = '';
    // й»ҳи®ӨдјҡиҜқ
    const defItem = document.createElement('div');
    defItem.className = 'session-item' + (currentKey === '' ? ' active' : '');
    defItem.innerHTML = '<span>\u9ed8\u8ba4\u4f1a\u8bdd</span>';
    defItem.addEventListener('click', () => { switchSession(''); panel.classList.remove('show'); renderSessions(); });
    list.appendChild(defItem);
    // иҮӘе®ҡд№үдјҡиҜқ
    sessions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'session-item' + (currentKey === s.key ? ' active' : '');
      const label = document.createElement('span');
      label.textContent = s.name || s.key;
      item.appendChild(label);
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '\u2716';
      del.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('\u5220\u9664\u4f1a\u8bdd "' + (s.name || s.key) + '"?')) {
          localStorage.removeItem(STORAGE_KEY + '_' + s.key);
          saveSessions(sessions.filter(x => x.key !== s.key));
          if (currentKey === s.key) switchSession('');
          renderSessions();
        }
      });
      item.appendChild(del);
      item.addEventListener('click', () => { switchSession(s.key); panel.classList.remove('show'); renderSessions(); });
      list.appendChild(item);
    });
  }

  toggle.addEventListener('click', () => { panel.classList.toggle('show'); renderSessions(); });
  panel.addEventListener('click', e => { if (e.target === panel) panel.classList.remove('show'); });
  newBtn.addEventListener('click', () => {
    const name = prompt('\u8f93\u5165\u4f1a\u8bdd\u540d\u79f0:');
    if (!name) return;
    const key = Date.now().toString(36);
    const sessions = getSessions();
    sessions.push({ key, name });
    saveSessions(sessions);
    switchSession(key);
    panel.classList.remove('show');
  });
}

// в”Җв”Җ U5: жҗңзҙўеҠҹиғҪ в”Җв”Җ
function initSearch() {
  const searchToggle = $('search-toggle');
  const searchBar = $('search-bar');
  const searchInput = $('search-input');
  const searchClose = $('search-close');

  searchToggle.addEventListener('click', () => {
    searchBar.classList.toggle('show');
    if (searchBar.classList.contains('show')) {
      searchInput.focus();
    } else {
      searchInput.value = '';
      clearHighlights();
    }
  });
  searchClose.addEventListener('click', () => {
    searchBar.classList.remove('show');
    searchInput.value = '';
    clearHighlights();
  });
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    clearHighlights();
    if (!q) return;
    // A8: дҪҝз”Ё TreeWalker йҒҚеҺҶж–Үжң¬иҠӮзӮ№пјҢйҒҝе…Қ innerHTML жіЁе…Ҙз ҙеқҸ DOM
    const bubbles = DOM.messages.querySelectorAll('.bubble');
    bubbles.forEach(b => {
      const walker = document.createTreeWalker(b, NodeFilter.SHOW_TEXT, null);
      const matches = [];
      let node;
      while ((node = walker.nextNode())) {
        const idx = node.textContent.toLowerCase().indexOf(q);
        if (idx !== -1) matches.push({ node, idx });
      }
      matches.reverse().forEach(({ node, idx }) => {
        const span = document.createElement('span');
        span.className = 'highlight';
        const range = document.createRange();
        range.setStart(node, idx);
        range.setEnd(node, idx + q.length);
        range.surroundContents(span);
      });
      if (matches.length > 0) {
        b.closest('.msg').scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  });
}
function clearHighlights() {
  DOM.messages.querySelectorAll('.highlight').forEach(el => {
    el.replaceWith(document.createTextNode(el.textContent));
  });
}

// в”Җв”Җ N3: еҜјеҮәиҒҠеӨ©и®°еҪ• в”Җв”Җ
function initExport() {
  const exportBtn = $('export-btn');
  exportBtn.addEventListener('click', () => {
    if (chatHistory.length === 0) {
      showToast('жІЎжңүиҒҠеӨ©и®°еҪ•еҸҜеҜјеҮә', 2000);
      return;
    }
    let md = '# PocketClaw иҒҠеӨ©и®°еҪ•\n\n';
    md += 'еҜјеҮәж—¶й—ҙ: ' + new Date().toLocaleString('zh-CN') + '\n\n---\n\n';
    chatHistory.forEach(msg => {
      const prefix = msg.role === 'user' ? '**рҹ‘Ө жҲ‘**' : '**рҹӨ– AI**';
      md += prefix + ' (' + (msg.time || '') + ')\n\n' + msg.text + '\n\n---\n\n';
    });
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'PocketClaw_chat_' + new Date().toISOString().slice(0,10) + '.md';
    a.click();
    URL.revokeObjectURL(url);
    showToast('иҒҠеӨ©и®°еҪ•е·ІеҜјеҮә', 2000);
  });
}

// в”Җв”Җ N4: еӨҡдјҡиҜқж”ҜжҢҒ в”Җв”Җ
const SESSIONS_KEY = 'pocketclaw_sessions';
function getSessions() {
  try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch(e) { return []; }
}
function saveSessions(sessions) {
  try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions)); } catch(e) {}
}
function switchSession(key) {
  // дҝқеӯҳеҪ“еүҚдјҡиҜқ
  saveChatHistory();
  // еҲҮжҚў key
  STATE.sessionKey = key;
  // е°қиҜ•еҠ иҪҪж–°дјҡиҜқеҺҶеҸІ
  const sKey = STORAGE_KEY + '_' + key;
  chatHistory.length = 0;
  try {
    const raw = localStorage.getItem(sKey);
    if (raw && raw.charAt(0) === '[') {
      JSON.parse(raw).forEach(m => chatHistory.push(m));
    }
  } catch(e) {}
  // йҮҚж–°жёІжҹ“
  DOM.messages.innerHTML = '';
  chatHistory.forEach(msg => {
    const div = document.createElement('div');
    div.className = 'msg ' + msg.role;
    const bubble = msg.role === 'user' ? escapeHtml(msg.text) : renderMd(msg.text);
    div.innerHTML = '<div class="bubble">' + bubble + '</div><div class="msg-time">' + (msg.time || '') + '</div>';
    DOM.messages.appendChild(div);
  });
  scrollToBottom();
  showToast('е·ІеҲҮжҚўеҲ°дјҡиҜқ: ' + key, 1500);
}

// в”Җв”Җ N8: зі»з»ҹиө„жәҗзӣ‘жҺ§пјҲи°ғиҜ•йқўжқҝжү©еұ•пјүв”Җв”Җ
function initResourceMonitor() {
  // жҜҸ 30 з§’жӣҙж–°дёҖж¬ЎеҶ…еӯҳдҝЎжҒҜ
  setInterval(() => {
    if (window.performance && performance.memory) {
      const mem = performance.memory;
      const used = (mem.usedJSHeapSize / 1048576).toFixed(1);
      const total = (mem.totalJSHeapSize / 1048576).toFixed(1);
      dbg('MEM: ' + used + '/' + total + ' MB', 'info');
    }
  }, 30000);
}

if (new URLSearchParams(location.search).has('dev')) {

  window._DOM = DOM;
  window._showToast = showToast;
  window._request = request;
  window._sendJSON = sendJSON;
  window._uuid = uuid;
  window._timeStr = timeStr;
}

})();
