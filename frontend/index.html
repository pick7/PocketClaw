<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PocketClaw</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
<!-- Markdown 渲染: marked.js (轻量, 仅 40KB gzipped) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<!-- 代码高亮: highlight.js core -->
<script src="https://cdn.jsdelivr.net/gh/nicedoc/highlight.js/build/highlight.min.js"></script>
<style id="base-styles">
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #1c2129;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --accent: #f97316;
  --accent-hover: #fb923c;
  --blue: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --border: #30363d;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; width: 100%;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  font-size: 15px;
  color: var(--text-primary);
  background: var(--bg-primary);
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: column;
}
/* 头部 */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
  backdrop-filter: blur(12px);
}
.header-left { display: flex; align-items: center; gap: 8px; }
.logo { font-size: 1.3em; }
.title {
  font-weight: 700;
  font-size: 1.05em;
  background: linear-gradient(135deg, var(--accent), #fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-center {
  font-size: 0.75em;
  color: var(--text-muted);
  flex: 1;
  text-align: center;
  max-width: 300px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-right { display: flex; gap: 2px; }
.header-right button {
  background: none;
  border: 1px solid transparent;
  color: var(--text-muted);
  font-size: 1em;
  width: 34px; height: 34px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.header-right button:hover {
  background: var(--bg-tertiary);
  border-color: var(--border);
  color: var(--text-primary);
}
/* 聊天区域 */
#chatArea {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 0;
  scroll-behavior: smooth;
}
#chatArea::-webkit-scrollbar { width: 6px; }
#chatArea::-webkit-scrollbar-track { background: transparent; }
#chatArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
#messages {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 16px;
}
/* 隐藏类 */
.hidden { display: none !important; }
</style>
<style id="chat-styles">
/* 消息容器 */
.msg {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  animation: msgIn 0.25s ease-out;
}
/* 用户消息：右对齐 */
.msg-user {
  flex-direction: row-reverse;
}
.msg-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1em;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg-user .msg-avatar {
  background: linear-gradient(135deg, var(--accent), #e05c0a);
  color: #fff;
  font-size: 0.85em;
  font-weight: 700;
}
.msg-assistant .msg-avatar {
  background: linear-gradient(135deg, #1f6feb, #388bfd);
}
/* 气泡 */
.msg-body {
  flex: 1;
  min-width: 0;
  max-width: 85%;
}
.msg-user .msg-body {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.msg-role {
  font-size: 0.72em;
  color: var(--text-muted);
  margin-bottom: 4px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.msg-content {
  line-height: 1.65;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.msg-user .msg-content {
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: #fff;
  border-radius: 18px 18px 4px 18px;
  padding: 10px 16px;
  display: inline-block;
  max-width: 100%;
  box-shadow: 0 2px 8px rgba(249,115,22,0.2);
}
.msg-user .msg-content a { color: #fcd34d; }
.msg-assistant .msg-content {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 4px 18px 18px 18px;
  padding: 12px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
/* Markdown 内容样式 */
.msg-content p { margin: 0.5em 0; }
.msg-content p:first-child { margin-top: 0; }
.msg-content p:last-child { margin-bottom: 0; }
.msg-content ul, .msg-content ol {
  padding-left: 1.5em;
  margin: 0.5em 0;
}
.msg-content li { margin: 0.3em 0; }
.msg-content h1, .msg-content h2, .msg-content h3 {
  margin: 0.8em 0 0.4em;
}
.msg-assistant .msg-content h1,
.msg-assistant .msg-content h2,
.msg-assistant .msg-content h3 { color: var(--blue); }
.msg-content h1 { font-size: 1.25em; }
.msg-content h2 { font-size: 1.12em; }
.msg-content h3 { font-size: 1.0em; }
.msg-assistant .msg-content strong { color: var(--accent); }
.msg-content a { color: var(--blue); text-decoration: none; }
.msg-content a:hover { text-decoration: underline; }
.msg-content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text-secondary);
  margin: 0.5em 0;
  background: rgba(249,115,22,0.05);
  border-radius: 0 6px 6px 0;
  padding: 8px 12px;
}
.msg-content table {
  border-collapse: collapse;
  margin: 0.5em 0;
  font-size: 0.9em;
  width: 100%;
}
.msg-content th, .msg-content td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.msg-content th { background: var(--bg-tertiary); color: var(--blue); }
/* 代码块 */
.msg-content code {
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 0.86em;
  background: rgba(110,118,129,0.2);
  padding: 2px 7px;
  border-radius: 5px;
}
.msg-user .msg-content code {
  background: rgba(255,255,255,0.2);
}
.msg-content pre {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 0.6em 0;
  position: relative;
}
.msg-content pre code {
  background: none;
  padding: 0;
  font-size: 0.85em;
  line-height: 1.5;
}
/* 代码块复制按钮 */
.code-copy {
  position: absolute;
  top: 6px; right: 6px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.7em;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
}
.msg-content pre:hover .code-copy { opacity: 1; }
.code-copy:hover { color: var(--text-primary); border-color: var(--text-muted); }
/* 打字光标 */
.typing-cursor {
  display: inline-block;
  width: 2px; height: 1em;
  background: var(--accent);
  margin-left: 2px;
  animation: blink 0.8s infinite;
  vertical-align: text-bottom;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
/* 思考中 */
.thinking-indicator {
  display: flex; align-items: center; gap: 8px;
  color: var(--text-secondary);
  font-size: 0.85em;
  padding: 8px 0;
}
.thinking-indicator::before {
  content: '✨';
  animation: sparkle 1.5s infinite;
}
@keyframes sparkle {
  0%,100% { opacity: 0.5; transform: scale(0.9); }
  50% { opacity: 1; transform: scale(1.1); }
}
.thinking-dots span {
  display: inline-block;
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: dotPulse 1.2s infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%,100% { opacity: 0.3; transform: scale(0.7); }
  50% { opacity: 1; transform: scale(1.2); }
}
/* 欢迎消息 */
.welcome-screen {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}
.welcome-icon {
  font-size: 4em;
  margin-bottom: 8px;
  filter: drop-shadow(0 4px 12px rgba(249,115,22,0.3));
}
.welcome-screen h2 {
  color: var(--text-primary);
  font-size: 1.5em;
  margin-bottom: 6px;
  font-weight: 700;
}
.welcome-screen p {
  font-size: 0.88em;
  max-width: 360px;
  margin: 0 auto 24px;
  line-height: 1.6;
  color: var(--text-secondary);
}
.welcome-hints {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 520px;
  margin: 0 auto 16px;
}
.hint-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 10px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.82em;
  line-height: 1.4;
  color: var(--text-secondary);
}
.hint-card:hover {
  background: var(--bg-tertiary);
  border-color: var(--accent);
  color: var(--text-primary);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(249,115,22,0.15);
}
@media (max-width: 540px) {
  .welcome-hints { grid-template-columns: repeat(2, 1fr); }
}
</style>
<style id="input-styles">
#inputArea {
  flex-shrink: 0;
  padding: 12px 16px 16px;
  background: linear-gradient(to top, var(--bg-primary), rgba(13,17,23,0.95));
  border-top: none;
}
.input-wrapper {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-secondary);
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 6px 8px 6px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
}
#userInput {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 0.95em;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.5;
  padding: 6px 0;
}
#userInput::placeholder { color: var(--text-muted); }
#btnSend, #btnStop {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
#btnSend {
  background: linear-gradient(135deg, var(--accent), #ea580c);
  color: #fff;
  box-shadow: 0 2px 8px rgba(249,115,22,0.3);
}
#btnSend:hover {
  background: linear-gradient(135deg, var(--accent-hover), var(--accent));
  transform: scale(1.05);
}
#btnSend:disabled {
  background: var(--text-muted);
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}
#btnStop {
  background: var(--red);
  color: #fff;
}
#btnStop:hover { background: #da3633; }
.input-footer {
  max-width: 800px;
  margin: 6px auto 0;
  display: flex;
  justify-content: space-between;
  font-size: 0.72em;
  color: var(--text-muted);
  padding: 0 4px;
}
/* 面板样式 */
.panel { position: fixed; inset: 0; z-index: 100; }
.panel-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(3px);
}
.panel-content {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 320px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  animation: slideIn 0.2s ease-out;
}
@keyframes slideIn {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.panel-header h3 { font-size: 1em; }
.panel-close {
  background: none; border: none; color: var(--text-secondary);
  font-size: 1.2em; cursor: pointer; padding: 4px 8px; border-radius: 4px;
}
.panel-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.panel-body {
  padding: 20px;
  flex: 1;
  overflow-y: auto;
}
.panel-body label {
  display: block;
  font-size: 0.8em;
  color: var(--text-secondary);
  margin-bottom: 4px;
  margin-top: 12px;
}
.panel-body label:first-child { margin-top: 0; }
.panel-body input[type="text"] {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 0.9em;
  outline: none;
}
.panel-body input:focus { border-color: var(--accent); }
.panel-actions { margin-top: 20px; }
.btn-primary {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.9em;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--accent-hover); }
</style>
<style id="responsive-styles">
/* 工具调用卡片 */
.tool-call {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  margin: 6px 0;
  font-size: 0.82em;
}
.tool-call-header {
  display: flex; align-items: center; gap: 6px;
  color: var(--blue);
  font-weight: 600;
  cursor: pointer;
}
.tool-call-header::before { content: "🔧"; }
.tool-call-body {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.9em;
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
}
.tool-call.collapsed .tool-call-body { display: none; }
/* 响应式 */
@media (max-width: 640px) {
  #header { padding: 6px 10px; }
  .title { font-size: 0.9em; }
  .header-center { display: none; }
  #messages { padding: 0 8px; }
  #inputArea { padding: 8px 10px 12px; }
  .input-wrapper { padding: 6px 12px; border-radius: 20px; }
  .panel-content { width: 100%; }
  .msg-avatar { width: 30px; height: 30px; font-size: 0.85em; }
  .msg-body { max-width: 90%; }
  .welcome-icon { font-size: 3em; }
  .welcome-screen h2 { font-size: 1.2em; }
}
/* 连接状态指示器 */
.status-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}
.status-dot.connected { background: var(--green); }
.status-dot.connecting { background: var(--accent); animation: dotPulse 1s infinite; }
.status-dot.disconnected { background: var(--red); }
/* 错误提示 */
.msg-error {
  background: rgba(248,81,73,0.1);
  border: 1px solid rgba(248,81,73,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--red);
  font-size: 0.88em;
  margin: 8px 0;
}
/* 消息时间戳 */
.msg-time {
  font-size: 0.68em;
  color: var(--text-muted);
  margin-top: 6px;
  user-select: none;
  letter-spacing: 0.3px;
}
.msg-user .msg-time { text-align: right; }
/* 消息操作栏 */
.msg-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  opacity: 0;
  transition: opacity 0.2s;
}
.msg:hover .msg-actions { opacity: 1; }
.msg-user .msg-actions { justify-content: flex-end; }
.msg-actions button {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.7em;
  padding: 3px 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.msg-actions button:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.msg-actions button.copied {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
/* 系统状态面板 */
.status-panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin: 8px 0;
}
.status-panel h4 {
  color: var(--blue);
  margin-bottom: 10px;
  font-size: 0.95em;
}
.status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 0.85em;
  border-bottom: 1px solid rgba(48,54,61,0.5);
}
.status-row:last-child { border-bottom: none; }
.status-label { color: var(--text-secondary); }
.status-value { color: var(--text-primary); font-weight: 500; }
.status-value.ok { color: var(--green); }
.status-value.warn { color: var(--accent); }
.status-value.err { color: var(--red); }
/* 会话列表面板 */
#sessionsPanel .panel-body {
  max-height: 60vh;
  overflow-y: auto;
}
.session-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
  font-size: 0.88em;
}
.session-item:hover { background: var(--bg-tertiary); }
.session-item.active {
  background: rgba(249,115,22,0.12);
  border: 1px solid rgba(249,115,22,0.3);
}
.session-item .session-name {
  font-weight: 500;
  color: var(--text-primary);
}
.session-item .session-meta {
  font-size: 0.8em;
  color: var(--text-muted);
}
/* 导出按钮反馈 */
.export-toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--green);
  color: #000;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 0.85em;
  font-weight: 600;
  z-index: 1000;
  animation: toastIn 0.3s ease-out, toastOut 0.3s 1.7s ease-in forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
/* 滚到底部按钮 */
#scrollToBottom {
  position: fixed;
  bottom: 100px;
  right: 24px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 1.1em;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  transition: all 0.2s;
}
#scrollToBottom:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
#scrollToBottom.visible { display: flex; }
</style>
</head>
<body>

<!-- 顶部状态栏 -->
<header id="header">
  <div class="header-left">
    <span class="logo">🦞</span>
    <span class="title">PocketClaw</span>
  </div>
  <div class="header-center" id="statusText">正在连接...</div>
  <div class="header-right">
    <button id="btnSessions" title="会话列表">📋</button>
    <button id="btnExport" title="导出对话">💾</button>
    <button id="btnStatus" title="系统状态">📊</button>
    <button id="btnNewChat" title="新对话">✨</button>
    <button id="btnSettings" title="设置">⚙️</button>
    <button id="btnOriginal" title="切换到 OpenClaw 原版界面">🔗</button>
  </div>
</header>

<!-- 聊天消息区域 -->
<main id="chatArea">
  <div id="messages"></div>
  <div id="scrollAnchor"></div>
</main>

<!-- 输入区域 -->
<footer id="inputArea">
  <div class="input-wrapper">

<script id="ws-module">
// ===== WebSocket 连接管理 =====
// 自动检测 WebSocket URL（HTTP 访问时使用同源地址，file:// 访问时回退到 127.0.0.1）
function detectWsUrl() {
  if (window.location.protocol === 'file:') return 'ws://127.0.0.1:18789';
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + window.location.host;
}
// HTML 转义辅助函数
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
const Gateway = {
  ws: null,
  url: detectWsUrl(),
  sessionKey: 'main',
  authToken: '',
  reqId: 0,
  pendingReqs: new Map(),
  connected: false,
  deviceId: null,
  _retryCount: 0,

  init() {
    // 从 localStorage 读取配置（优先使用保存的配置，否则自动检测）
    this.url = localStorage.getItem('pc_gateway_url') || detectWsUrl();
    this.sessionKey = localStorage.getItem('pc_session_key') || 'main';
    this.authToken = localStorage.getItem('pc_auth_token') || 'pocketclaw';
    // 生成或恢复 device ID
    this.deviceId = localStorage.getItem('pc_device_id');
    if (!this.deviceId) {
      this.deviceId = 'pocketclaw-web-' + Math.random().toString(36).slice(2, 10);
      localStorage.setItem('pc_device_id', this.deviceId);
    }
    this.connect();
  },

  connect() {
    if (this.ws && (this.ws.readyState === WebSocket.CONNECTING || this.ws.readyState === WebSocket.OPEN)) {
      this.ws.close();
    }
    StatusBar.set('connecting', '正在连接...');
    // 将 authToken 追加到 URL 路径（OpenClaw 网关要求密码在路径中）
    let wsUrl = this.url.replace(/\/+$/, '');
    if (this.authToken) wsUrl += '/' + this.authToken;
    try {
      this.ws = new WebSocket(wsUrl);
    } catch(e) {
      StatusBar.set('disconnected', '连接失败: 地址无效');
      return;
    }

    this.ws.onopen = () => {
      // 发送 connect 握手（OpenClaw 2026.2.26 协议版本 = 3）
      const connectParams = {
        minProtocol: 3,
        maxProtocol: 3,
        client: {
          id: 'webchat',
          version: '1.0.0',
          platform: navigator.platform || 'web',
          mode: 'webchat',
          displayName: 'PocketClaw Web',
        },
        auth: { token: this.authToken },
      };
      this.sendRaw({
        type: 'req',
        id: this._nextId(),
        method: 'connect',
        params: connectParams,
      });
    };

    this.ws.onmessage = (evt) => {
      let frame;
      try { frame = JSON.parse(evt.data); } catch(e) { return; }
      this._handleFrame(frame);
    };

    this.ws.onclose = (evt) => {
      this.connected = false;
      const reason = evt.reason || '连接断开';
      let hint = '';
      if (reason.includes('token_missing') || reason.includes('unauthorized')) {
        hint = ' → 请在设置中填入正确的 Auth Token';
      } else if (reason.includes('invalid connect params')) {
        hint = ' → 协议版本不匹配，请更新 PocketClaw';
      } else if (evt.code === 1006) {
        hint = ' → 网关未启动或地址错误，请检查 Docker 容器状态';
      }
      StatusBar.set('disconnected', `已断开 (${evt.code}): ${reason}${hint}`);
      // 清理所有挂起的请求
      this.pendingReqs.forEach((p) => {
        clearTimeout(p.timer);
        p.reject(new Error('连接已断开'));
      });
      this.pendingReqs.clear();
      // 自动重连（指数退避: 4s, 8s, 16s, 最大 60s）
      const delay = Math.min(4000 * Math.pow(2, this._retryCount), 60000);
      this._retryCount++;
      setTimeout(() => {
        if (!this.connected) this.connect();
      }, delay);
    };

    this.ws.onerror = () => {
      StatusBar.set('disconnected', '连接错误');
    };
  },

  _nextId() {
    return 'r' + (++this.reqId);
  },

  sendRaw(obj) {
    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify(obj));
    }
  },

  // 发送请求并返回 Promise
  request(method, params = {}) {
    return new Promise((resolve, reject) => {
      const id = this._nextId();
      this.pendingReqs.set(id, { resolve, reject, timer: setTimeout(() => {
        this.pendingReqs.delete(id);
        reject(new Error('请求超时'));
      }, 30000) });
      this.sendRaw({ type: 'req', id, method, params });
    });
  },

  _handleFrame(frame) {
    if (frame.type === 'res') {
      // 处理 connect 响应
      if (frame.ok && frame.payload && frame.payload.hello === 'ok') {
        this.connected = true;
        this._retryCount = 0;
        StatusBar.set('connected', '已连接');
        ChatHistory.load();
        return;
      }
      // handle hello-ok variant
      if (frame.ok && frame.payload) {
        this.connected = true;
        this._retryCount = 0;
        StatusBar.set('connected', '已连接');
        ChatHistory.load();
      }
      // 响应匹配
      const pending = this.pendingReqs.get(frame.id);
      if (pending) {
        clearTimeout(pending.timer);
        this.pendingReqs.delete(frame.id);
        if (frame.ok || frame.ok === undefined) {
          pending.resolve(frame.payload || frame);
        } else {
          pending.reject(new Error(frame.error?.message || '请求失败'));
        }
      }
      // chat.send 响应
      if (frame.payload && frame.payload.runId) {
        StreamHandler.onSendAck(frame.payload);
      }
    } else if (frame.type === 'event') {
      this._handleEvent(frame);
    }
  },

  _handleEvent(frame) {
    const { event, payload } = frame;
    if (event === 'chat') {
      StreamHandler.onChatEvent(payload);
    } else if (event === 'agent') {
      StreamHandler.onAgentEvent(payload);
    } else if (event === 'presence') {
      // 可选：处理 presence 更新
    }
  },

  disconnect() {
    if (this.ws) {
      this.ws.close();
      this.ws = null;
    }
  }
};
</script>
<script id="send-module">
// ===== 消息发送 =====
const ChatSend = {
  sending: false,
  currentRunId: null,

  send(text) {
    if (!text.trim() || this.sending || !Gateway.connected) return;
    this.sending = true;

    // 显示用户消息
    UI.addMessage('user', text);

    // 生成幂等 key
    const idempotencyKey = 'idem-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);

    // 发送到 Gateway
    const id = Gateway._nextId();
    Gateway.sendRaw({
      type: 'req',
      id: id,
      method: 'chat.send',
      params: {
        message: text,
        sessionKey: Gateway.sessionKey,
        idempotencyKey: idempotencyKey,
      }
    });

    // 显示思考中指示
    StreamHandler.startStreaming();

    // 更新 UI 状态
    UI.setSendingState(true);
  },

  abort() {
    if (!this.sending) return;
    Gateway.sendRaw({
      type: 'req',
      id: Gateway._nextId(),
      method: 'chat.abort',
      params: { sessionKey: Gateway.sessionKey }
    });
  }
};
</script>
<script id="stream-module">
// ===== 流式响应处理 =====
const StreamHandler = {
  streamingEl: null,
  streamBuffer: '',
  currentRunId: null,

  startStreaming() {
    this.streamBuffer = '';
    this.streamingEl = UI.addMessage('assistant', '', true);
    UI.scrollToBottom();
  },

  onSendAck(payload) {
    if (payload.runId) {
      this.currentRunId = payload.runId;
    }
    if (payload.status === 'in_flight') {
      // 重复发送，忽略
    }
  },

  onChatEvent(payload) {
    if (!payload) return;

    // 处理不同的 chat 事件类型
    // OpenClaw 通过 chat event 推送助手回复的 delta/text
    if (payload.type === 'text' || payload.delta || payload.text) {
      const delta = payload.delta || payload.text || '';
      if (delta) {
        this.streamBuffer += delta;
        this._updateStreamingMessage();
      }
    }

    // 完成
    if (payload.type === 'done' || payload.status === 'completed' || payload.done) {
      this._finishStreaming();
    }

    // 错误
    if (payload.type === 'error' || payload.error) {
      const errMsg = payload.error?.message || payload.message || '发生错误';
      UI.addError(errMsg);
      this._finishStreaming();
    }
  },

  onAgentEvent(payload) {
    if (!payload) return;

    // agent 事件包含流式文本
    if (payload.type === 'text_delta' || payload.type === 'content_block_delta') {
      const delta = payload.delta?.text || payload.text || payload.delta || '';
      if (delta && typeof delta === 'string') {
        this.streamBuffer += delta;
        this._updateStreamingMessage();
      }
    }

    // 工具调用
    if (payload.type === 'tool_use' || payload.type === 'tool_call') {
      const toolName = payload.name || payload.tool || '工具调用';
      const toolInput = payload.input || payload.arguments || '';
      UI.addToolCall(toolName, typeof toolInput === 'string' ? toolInput : JSON.stringify(toolInput, null, 2));
    }

    // 工具结果
    if (payload.type === 'tool_result') {
      // 工具结果通常不需要特别显示
    }

    // 完整的助手消息文本（非流式）
    if (payload.type === 'message' && payload.role === 'assistant') {
      const text = payload.content || payload.text || '';
      if (text && !this.streamBuffer) {
        this.streamBuffer = text;
        this._updateStreamingMessage();
      }
      this._finishStreaming();
    }

    // 完成信号
    if (payload.type === 'message_stop' || payload.type === 'run_complete' ||
        payload.status === 'completed' || payload.status === 'done') {
      this._finishStreaming();
    }

    // 错误
    if (payload.type === 'error') {
      const errMsg = payload.message || payload.error || '代理运行出错';
      UI.addError(typeof errMsg === 'string' ? errMsg : JSON.stringify(errMsg));
      this._finishStreaming();
    }
  },

  // 过滤 <think>...</think> 推理标签（部分模型会泄漏内部思考过程）
  _stripThinkTags(text) {
    // 移除完整的 <think>...</think> 块
    let cleaned = text.replace(/<think>[\s\S]*?<\/think>/gi, '');
    // 如果只有 <think> 开头但还没关闭（流式中），隐藏从 <think> 开始的所有内容
    const openIdx = cleaned.search(/<think>/i);
    if (openIdx !== -1) cleaned = cleaned.substring(0, openIdx);
    return cleaned.trim();
  },

  _updateStreamingMessage() {
    if (this.streamingEl) {
      const contentEl = this.streamingEl.querySelector('.msg-content');
      if (contentEl) {
        const display = this._stripThinkTags(this.streamBuffer);
        contentEl.innerHTML = (display ? MdRender.render(display) : '<span style="opacity:0.5">思考中...</span>') + '<span class="typing-cursor"></span>';
        UI.scrollToBottom();
      }
    }
  },

  _finishStreaming() {
    if (this.streamingEl) {
      const contentEl = this.streamingEl.querySelector('.msg-content');
      if (contentEl && this.streamBuffer) {
        const display = this._stripThinkTags(this.streamBuffer);
        contentEl.innerHTML = MdRender.render(display || this.streamBuffer);
        MdRender.addCopyButtons(contentEl);
        MdRender._highlightCode(contentEl);
      }
      // 保存原始文本
      this.streamingEl.dataset.rawText = this.streamBuffer || '';
      // 添加时间戳
      const body = this.streamingEl.querySelector('.msg-body') || this.streamingEl;
      const timeEl = document.createElement('div');
      timeEl.className = 'msg-time';
      timeEl.textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      body.appendChild(timeEl);
      // 添加操作按钮
      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      const copyBtn = document.createElement('button');
      copyBtn.textContent = '📋 复制';
      const msgElRef = this.streamingEl;  // 局部引用，避免 streamingEl 置 null 后丢失
      copyBtn.addEventListener('click', () => {
        const raw = msgElRef?.dataset.rawText || contentEl?.textContent || '';
        navigator.clipboard.writeText(raw).then(() => {
          copyBtn.textContent = '✅ 已复制';
          setTimeout(() => { copyBtn.textContent = '📋 复制'; }, 1500);
        });
      });
      actions.appendChild(copyBtn);
      const regenBtn = document.createElement('button');
      regenBtn.textContent = '🔄 重新生成';
      const streamEl = this.streamingEl;
      regenBtn.addEventListener('click', () => {
        const msgs = Array.from(UI.messagesEl.querySelectorAll('.msg'));
        const idx = msgs.indexOf(streamEl);
        for (let i = idx - 1; i >= 0; i--) {
          if (msgs[i].dataset.role === 'user') {
            const userText = msgs[i].dataset.rawText;
            if (userText) {
              streamEl.remove();
              ChatSend.send(userText);
            }
            break;
          }
        }
      });
      actions.appendChild(regenBtn);
      body.appendChild(actions);
      // 移除思考指示
      const thinking = this.streamingEl.querySelector('.thinking-indicator');
      if (thinking) thinking.remove();
      this.streamingEl = null;
    }
    this.streamBuffer = '';
    this.currentRunId = null;
    ChatSend.sending = false;
    UI.setSendingState(false);
  }
};
</script>
<script id="history-module">
// ===== 聊天历史 =====
const ChatHistory = {
  async load() {
    try {
      const res = await Gateway.request('chat.history', {
        sessionKey: Gateway.sessionKey
      });

      // 清空现有消息
      UI.clearMessages();

      const entries = res?.entries || res?.messages || res?.history || [];
      if (!entries.length) {
        UI.showWelcome();
        return;
      }

      entries.forEach(entry => {
        const role = entry.role || (entry.type === 'user' ? 'user' : 'assistant');
        let text = entry.content || entry.text || entry.message || '';

        // 处理数组类型的 content
        if (Array.isArray(text)) {
          text = text.map(block => {
            if (typeof block === 'string') return block;
            if (block.type === 'text') return block.text || '';
            return '';
          }).join('');
        }

        if (text && typeof text === 'string' && text.trim()) {
          // 跳过过长的被截断的消息占位符
          if (text.includes('[chat.history omitted')) return;
          UI.addMessage(role, text, false, true);
        }
      });

      UI.scrollToBottom();
    } catch (e) {
      // 如果获取历史失败，显示欢迎页
      console.warn('加载历史失败:', e.message);
      UI.showWelcome();
    }
  }
};
</script>
<script id="session-module">
// ===== 会话管理 =====
const Session = {
  key: 'main',

  init() {
    // 从 localStorage 读取会话 key
    const saved = localStorage.getItem('pocketclaw_session');
    if (saved) this.key = saved;
    Gateway.sessionKey = this.key;
  },

  setKey(newKey) {
    if (!newKey || !newKey.trim()) return;
    this.key = newKey.trim();
    Gateway.sessionKey = this.key;
    localStorage.setItem('pocketclaw_session', this.key);
  },

  newChat() {
    // 生成新的随机 session key
    const ts = Date.now().toString(36);
    const rand = Math.random().toString(36).slice(2, 6);
    const newKey = 'chat-' + ts + '-' + rand;
    this.setKey(newKey);

    // 清空当前消息并显示欢迎
    UI.clearMessages();
    UI.showWelcome();

    // 更新设置面板中的显示
    const cfgEl = document.getElementById('cfgSession');
    if (cfgEl) cfgEl.value = this.key;

    // 如果已连接，不需要重连（同一个 WS 连接可以切换 sessionKey）
    StatusBar.set('connected', '新对话已创建');
  },

  reset() {
    // 回到默认 session
    this.setKey('main');
    UI.clearMessages();

    // 重新加载 main session 的历史
    if (Gateway.connected) {
      ChatHistory.load();
    } else {
      UI.showWelcome();
    }

    const cfgEl = document.getElementById('cfgSession');
    if (cfgEl) cfgEl.value = 'main';
  }
};
</script>
<script id="markdown-module">
// ===== Markdown 渲染 =====
const MdRender = {
  _ready: false,

  init() {
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        breaks: true,
        gfm: true,
      });
      this._ready = true;
    }
  },

  // 渲染后手动对 code 块执行高亮（marked@12 不再支持 highlight 选项）
  _highlightCode(container) {
    if (typeof hljs === 'undefined' || !container) return;
    container.querySelectorAll('pre code').forEach(block => {
      if (!block.dataset.highlighted) {
        hljs.highlightElement(block);
        block.dataset.highlighted = 'true';
      }
    });
  },

  // 基本 HTML 净化 — 过滤 script/iframe/event handler 防 XSS
  _sanitize(html) {
    return html
      .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
      .replace(/<iframe\b[^>]*>[\s\S]*?<\/iframe>/gi, '')
      .replace(/<object\b[^>]*>[\s\S]*?<\/object>/gi, '')
      .replace(/<embed\b[^>]*\/?>/gi, '')
      .replace(/\bon\w+\s*=\s*(['"]?)[\s\S]*?\1/gi, '')
      .replace(/\bhref\s*=\s*['"]?\s*javascript:/gi, 'href="#blocked:')
      .replace(/\bsrc\s*=\s*['"]?\s*javascript:/gi, 'src="#blocked:');
  },

  render(text) {
    if (!text) return '';
    if (!this._ready) this.init();

    try {
      if (this._ready) {
        return this._sanitize(marked.parse(text));
      }
    } catch(e) {
      console.warn('Markdown 渲染失败:', e);
    }
    // fallback: 简单文本转 HTML
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  },

  addCopyButtons(container) {
    if (!container) return;
    container.querySelectorAll('pre').forEach(pre => {
      if (pre.querySelector('.code-copy')) return; // 已有按钮
      const btn = document.createElement('button');
      btn.className = 'code-copy';
      btn.textContent = '复制';
      btn.addEventListener('click', () => {
        const code = pre.querySelector('code');
        const text = code ? code.textContent : pre.textContent;
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = '已复制 ✓';
          setTimeout(() => { btn.textContent = '复制'; }, 2000);
        }).catch(() => {
          btn.textContent = '复制失败';
          setTimeout(() => { btn.textContent = '复制'; }, 2000);
        });
      });
      pre.style.position = 'relative';
      pre.appendChild(btn);
    });

    // 给代码块添加语言标签
    container.querySelectorAll('pre code').forEach(codeEl => {
      const cls = codeEl.className || '';
      const langMatch = cls.match(/language-(\w+)/);
      if (langMatch && !codeEl.parentElement.querySelector('.lang-label')) {
        const label = document.createElement('span');
        label.className = 'lang-label';
        label.textContent = langMatch[1];
        codeEl.parentElement.insertBefore(label, codeEl);
      }
    });
  }
};
</script>
<script id="tools-module">
// ===== 工具调用 UI =====
const ToolsUI = {
  addToolCall(name, input) {
    const container = document.getElementById('messages');
    if (!container) return;

    const el = document.createElement('div');
    el.className = 'tool-call';

    const header = document.createElement('div');
    header.className = 'tool-header';
    header.innerHTML = `<span class="tool-icon">🔧</span><span class="tool-name">${this._escape(name)}</span><span class="tool-toggle">▼</span>`;

    const body = document.createElement('div');
    body.className = 'tool-body';
    body.style.display = 'none';
    if (input && input.trim()) {
      const pre = document.createElement('pre');
      const code = document.createElement('code');
      code.textContent = input;
      if (typeof hljs !== 'undefined') {
        try { code.innerHTML = hljs.highlight(input, { language: 'json' }).value; } catch(e) {}
      }
      pre.appendChild(code);
      body.appendChild(pre);
    } else {
      body.innerHTML = '<em>无参数</em>';
    }

    header.addEventListener('click', () => {
      const visible = body.style.display !== 'none';
      body.style.display = visible ? 'none' : 'block';
      header.querySelector('.tool-toggle').textContent = visible ? '▼' : '▲';
    });

    el.appendChild(header);
    el.appendChild(body);
    container.appendChild(el);
    UI.scrollToBottom();
  },

  _escape(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
};
</script>
<script id="status-module">
// ===== 状态栏 =====
const StatusBar = {
  el: null,
  dotEl: null,
  textEl: null,

  init() {
    this.el = document.getElementById('statusDot');
    this.textEl = document.getElementById('statusText');
    // statusDot 是 header 里的一个小圆点元素
    if (!this.el) {
      // 动态创建状态指示点（插入 header 的 logo 旁边）
      const logo = document.querySelector('.logo');
      if (logo) {
        this.dotEl = document.createElement('span');
        this.dotEl.id = 'statusDot';
        this.dotEl.className = 'status-dot disconnected';
        this.dotEl.title = '未连接';
        logo.appendChild(this.dotEl);
      }
    } else {
      this.dotEl = this.el;
    }
  },

  set(state, text) {
    // state: 'connected' | 'connecting' | 'disconnected'
    if (this.dotEl) {
      this.dotEl.className = 'status-dot ' + state;
      this.dotEl.title = text || state;
    }
    if (this.textEl) {
      this.textEl.textContent = text || '';
    }
    // 同时更新 document title
    const prefix = state === 'connected' ? '🟢' : state === 'connecting' ? '🟡' : '🔴';
    document.title = prefix + ' PocketClaw';
  }
};
</script>
<script id="settings-module">
// ===== 设置面板 =====
const Settings = {
  panelEl: null,

  init() {
    this.panelEl = document.getElementById('settingsPanel');

    // 打开设置
    document.getElementById('btnSettings')?.addEventListener('click', () => this.open());
    // 关闭设置
    document.getElementById('btnCloseSettings')?.addEventListener('click', () => this.close());
    // 点击背景遮罩关闭
    this.panelEl?.querySelector('.panel-backdrop')?.addEventListener('click', () => this.close());
    // 保存按钮
    document.getElementById('btnSaveSettings')?.addEventListener('click', () => this.save());

    // 加载已保存的设置到输入框
    const savedUrl = localStorage.getItem('pc_gateway_url') || detectWsUrl();
    const savedSession = localStorage.getItem('pc_session_key') || 'main';
    const savedToken = localStorage.getItem('pc_auth_token') || 'pocketclaw';
    const cfgGw = document.getElementById('cfgGateway');
    const cfgSs = document.getElementById('cfgSession');
    const cfgTk = document.getElementById('cfgAuthToken');
    if (cfgGw) cfgGw.value = savedUrl;
    if (cfgSs) cfgSs.value = savedSession;
    if (cfgTk) cfgTk.value = savedToken;
  },

  open() {
    if (this.panelEl) {
      this.panelEl.classList.remove('hidden');
      // 同步当前值
      const cfgSs = document.getElementById('cfgSession');
      if (cfgSs) cfgSs.value = Session.key;
    }
  },

  close() {
    if (this.panelEl) {
      this.panelEl.classList.add('hidden');
    }
  },

  save() {
    const gatewayUrl = document.getElementById('cfgGateway')?.value?.trim();
    const sessionKey = document.getElementById('cfgSession')?.value?.trim();
    const authToken = document.getElementById('cfgAuthToken')?.value?.trim() || '';

    if (gatewayUrl) {
      localStorage.setItem('pc_gateway_url', gatewayUrl);
      Gateway.url = gatewayUrl;
    }

    localStorage.setItem('pc_auth_token', authToken);
    Gateway.authToken = authToken;

    if (sessionKey) {
      Session.setKey(sessionKey);
    }

    this.close();

    // 断开并重连
    Gateway.disconnect();
    StatusBar.set('connecting', '正在重连...');
    setTimeout(() => Gateway.connect(), 300);
  }
};
</script>
<script id="app-init">
// ===== UI 操作 =====
const UI = {
  messagesEl: null,
  inputEl: null,
  btnSend: null,
  btnStop: null,

  init() {
    this.messagesEl = document.getElementById('messages');
    this.inputEl = document.getElementById('userInput');
    this.btnSend = document.getElementById('btnSend');
    this.btnStop = document.getElementById('btnStop');
  },

  addMessage(role, text, isStreaming = false, isHistory = false) {
    const el = document.createElement('div');
    el.className = 'msg ' + (role === 'user' ? 'msg-user' : 'msg-assistant');
    el.dataset.role = role;
    el.dataset.rawText = text || '';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? '👤' : '🐾';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const content = document.createElement('div');
    content.className = 'msg-content';

    if (isStreaming) {
      content.innerHTML = '<div class="thinking-indicator"><span></span><span></span><span></span></div>';
    } else if (text) {
      content.innerHTML = MdRender.render(text);
      MdRender.addCopyButtons(content);
      MdRender._highlightCode(content);
    }

    body.appendChild(content);

    // 时间戳
    const timeEl = document.createElement('div');
    timeEl.className = 'msg-time';
    timeEl.textContent = isHistory ? '' : new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    body.appendChild(timeEl);

    // 消息操作按钮
    if (!isStreaming) {
      const actions = document.createElement('div');
      actions.className = 'msg-actions';
      const copyBtn = document.createElement('button');
      copyBtn.textContent = '📋 复制';
      copyBtn.addEventListener('click', () => {
        const rawText = el.dataset.rawText || content.textContent;
        navigator.clipboard.writeText(rawText).then(() => {
          copyBtn.textContent = '✅ 已复制';
          copyBtn.classList.add('copied');
          setTimeout(() => { copyBtn.textContent = '📋 复制'; copyBtn.classList.remove('copied'); }, 1500);
        });
      });
      actions.appendChild(copyBtn);
      if (role === 'assistant' && !isHistory) {
        const regenBtn = document.createElement('button');
        regenBtn.textContent = '🔄 重新生成';
        regenBtn.addEventListener('click', () => {
          // 找到这条消息前面最近的用户消息
          const msgs = Array.from(this.messagesEl.querySelectorAll('.msg'));
          const idx = msgs.indexOf(el);
          for (let i = idx - 1; i >= 0; i--) {
            if (msgs[i].dataset.role === 'user') {
              const userText = msgs[i].dataset.rawText;
              if (userText) {
                el.remove(); // 移除当前 AI 回复
                ChatSend.send(userText);
              }
              break;
            }
          }
        });
        actions.appendChild(regenBtn);
      }
      body.appendChild(actions);
    }

    el.appendChild(avatar);
    el.appendChild(body);
    this.messagesEl?.appendChild(el);
    if (!isStreaming) this.scrollToBottom();
    return el;
  },

  addError(msg) {
    const el = document.createElement('div');
    el.className = 'msg msg-error';
    const icon = document.createElement('span');
    icon.className = 'error-icon';
    icon.textContent = '⚠️';
    const text = document.createElement('span');
    text.textContent = msg;
    el.appendChild(icon);
    el.appendChild(document.createTextNode(' '));
    el.appendChild(text);
    this.messagesEl?.appendChild(el);
    this.scrollToBottom();
  },

  addToolCall(name, input) {
    ToolsUI.addToolCall(name, input);
  },

  clearMessages() {
    if (this.messagesEl) this.messagesEl.innerHTML = '';
  },

  showWelcome() {
    this.clearMessages();
    const welcome = document.createElement('div');
    welcome.className = 'welcome-screen';
    welcome.innerHTML = `
      <div class="welcome-icon">🐾</div>
      <h2>PocketClaw</h2>
      <p>你的专属 AI 助手，随身携带</p>
      <div class="welcome-hints">
        <div class="hint-card" onclick="UI._insertHint('帮我写一段 Python 代码')">💻 帮我写代码</div>
        <div class="hint-card" onclick="UI._insertHint('解释一下这个概念')">📖 解释概念</div>
        <div class="hint-card" onclick="UI._insertHint('帮我翻译成英文')">🌍 翻译文本</div>
        <div class="hint-card" onclick="UI._insertHint('帮我总结这段文章的要点')">📝 总结要点</div>
        <div class="hint-card" onclick="UI._insertHint('帮我检查并优化这段代码')">🔧 代码审查</div>
        <div class="hint-card" onclick="UI._insertHint('你好，你能做些什么？')">🧠 了解能力</div>
      </div>
      <div style="margin-top:16px;font-size:0.75em;color:var(--text-muted);">
        💡 提示：点击顶部 📊 查看系统状态 · 💾 导出对话 · 📋 浏览会话历史
      </div>
    `;
    this.messagesEl?.appendChild(welcome);
  },

  _insertHint(text) {
    if (this.inputEl) {
      this.inputEl.value = text;
      this.inputEl.focus();
    }
  },

  setSendingState(sending) {
    if (this.btnSend) this.btnSend.style.display = sending ? 'none' : '';
    if (this.btnStop) this.btnStop.style.display = sending ? '' : 'none';
    if (this.inputEl) this.inputEl.disabled = sending;
  },

  scrollToBottom() {
    const anchor = document.getElementById('scrollAnchor');
    if (anchor) {
      anchor.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
  }
};

// ===== 应用启动 =====
document.addEventListener('DOMContentLoaded', () => {
  // 1. 初始化各模块
  UI.init();
  MdRender.init();
  StatusBar.init();
  Session.init();
  Settings.init();

  // 2. Gateway 地址已在 Gateway.init() 中从 pc_gateway_url 读取

  // 3. 绑定发送事件
  document.getElementById('btnSend')?.addEventListener('click', () => {
    const text = UI.inputEl?.value;
    if (text?.trim()) {
      ChatSend.send(text.trim());
      UI.inputEl.value = '';
      UI.inputEl.style.height = 'auto';
    }
  });

  // 4. 停止按钮
  document.getElementById('btnStop')?.addEventListener('click', () => {
    ChatSend.abort();
  });

  // 5. 新对话按钮
  document.getElementById('btnNewChat')?.addEventListener('click', () => {
    Session.newChat();
  });

  // 6. 切换原版按钮
  document.getElementById('btnOriginal')?.addEventListener('click', () => {
    window.open('http://127.0.0.1:18789/chat#token=pocketclaw', '_blank');
  });

  // 7. 导出对话
  document.getElementById('btnExport')?.addEventListener('click', () => {
    const msgs = document.querySelectorAll('#messages .msg');
    if (!msgs.length) { ExportUtils.toast('没有消息可以导出'); return; }
    let md = '# PocketClaw 对话记录\n';
    md += `> 导出时间: ${new Date().toLocaleString('zh-CN')}\n`;
    md += `> 会话: ${Session.key}\n\n---\n\n`;
    msgs.forEach(msg => {
      const role = msg.dataset.role === 'user' ? '👤 **用户**' : '🐾 **Claw**';
      const text = msg.dataset.rawText || msg.querySelector('.msg-content')?.textContent || '';
      const time = msg.querySelector('.msg-time')?.textContent || '';
      if (text.trim()) {
        md += `### ${role}${time ? '  _' + time + '_' : ''}\n\n${text.trim()}\n\n`;
      }
    });
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `PocketClaw_${Session.key}_${new Date().toISOString().slice(0,10)}.md`;
    a.click();
    URL.revokeObjectURL(url);
    ExportUtils.toast('对话已导出为 Markdown');
  });

  // 8. 系统状态按钮
  document.getElementById('btnStatus')?.addEventListener('click', async () => {
    const panel = document.createElement('div');
    panel.className = 'status-panel';
    panel.innerHTML = '<h4>📊 系统状态</h4>';
    const rows = [
      ['连接状态', Gateway.connected ? '✅ 已连接' : '❌ 未连接', Gateway.connected ? 'ok' : 'err'],
      ['Gateway', Gateway.url, ''],
      ['会话 Key', Session.key, ''],
      ['Auth Token', Gateway.authToken ? '已设置' : '未设置', Gateway.authToken ? 'ok' : 'warn'],
      ['协议版本', 'v3 (OpenClaw 2026.2.26)', 'ok'],
    ];
    // 尝试获取服务端信息
    if (Gateway.connected) {
      try {
        const agentInfo = await Gateway.request('agent.identity.get', {});
        if (agentInfo?.name) rows.push(['AI 名称', agentInfo.name, 'ok']);
        if (agentInfo?.model) rows.push(['当前模型', agentInfo.model, 'ok']);
      } catch(e) {}
      try {
        const sessions = await Gateway.request('sessions.list', {});
        const count = sessions?.sessions?.length || sessions?.length || 0;
        rows.push(['活跃会话', count + ' 个', 'ok']);
      } catch(e) {}
    }
    rows.forEach(([label, value, cls]) => {
      const row = document.createElement('div');
      row.className = 'status-row';
      row.innerHTML = `<span class="status-label">${escHtml(label)}</span><span class="status-value ${cls}">${escHtml(value)}</span>`;
      panel.appendChild(row);
    });
    // 关闭按钮
    const closeBtn = document.createElement('button');
    closeBtn.textContent = '关闭';
    closeBtn.className = 'btn-primary';
    closeBtn.style.cssText = 'margin-top:12px;width:100%;';
    closeBtn.addEventListener('click', () => panel.remove());
    panel.appendChild(closeBtn);
    // 插入到消息区域
    UI.messagesEl.appendChild(panel);
    UI.scrollToBottom();
  });

  // 9. 会话列表按钮
  document.getElementById('btnSessions')?.addEventListener('click', async () => {
    const panel = document.getElementById('sessionsPanel');
    if (!panel) return;
    panel.classList.remove('hidden');
    const listEl = document.getElementById('sessionsList');
    listEl.innerHTML = '<div style="color:var(--text-secondary);font-size:0.88em;text-align:center;padding:20px 0;">加载中...</div>';
    if (Gateway.connected) {
      try {
        const res = await Gateway.request('sessions.list', {});
        const sessions = res?.sessions || res || [];
        if (sessions.length === 0) {
          listEl.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:20px 0;">暂无会话</div>';
        } else {
          listEl.innerHTML = '';
          sessions.forEach(s => {
            const key = s.key || s.sessionKey || s.id || 'unknown';
            const item = document.createElement('div');
            item.className = 'session-item' + (key === Session.key ? ' active' : '');
            item.innerHTML = `<span class="session-name">${escHtml(key)}</span><span class="session-meta">${escHtml(s.messages || '')}</span>`;
            item.addEventListener('click', () => {
              Session.setKey(key);
              panel.classList.add('hidden');
              UI.clearMessages();
              ChatHistory.load();
            });
            listEl.appendChild(item);
          });
        }
      } catch(e) {
        listEl.innerHTML = `<div style="color:var(--red);font-size:0.88em;text-align:center;padding:20px 0;">加载失败: ${escHtml(e.message)}</div>`;
      }
    } else {
      listEl.innerHTML = '<div style="color:var(--red);font-size:0.88em;text-align:center;padding:20px 0;">未连接到 Gateway</div>';
    }
  });
  document.getElementById('btnCloseSessions')?.addEventListener('click', () => {
    document.getElementById('sessionsPanel')?.classList.add('hidden');
  });
  document.getElementById('sessionsPanel')?.querySelector('.panel-backdrop')?.addEventListener('click', () => {
    document.getElementById('sessionsPanel')?.classList.add('hidden');
  });

  // 10. 键盘事件
  UI.inputEl?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('btnSend')?.click();
    }
  });

  // 11. 自动伸缩输入框
  UI.inputEl?.addEventListener('input', () => {
    UI.inputEl.style.height = 'auto';
    UI.inputEl.style.height = Math.min(UI.inputEl.scrollHeight, 200) + 'px';
  });

  // 11b. 滚到底部按钮
  const scrollBtn = document.getElementById('scrollToBottom');
  const chatArea = document.getElementById('chatArea');
  if (scrollBtn && chatArea) {
    chatArea.addEventListener('scroll', () => {
      const distFromBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight;
      scrollBtn.classList.toggle('visible', distFromBottom > 200);
    });
    scrollBtn.addEventListener('click', () => {
      UI.scrollToBottom();
    });
  }

  // 12. 模型信息显示
  const modelInfoEl = document.getElementById('modelInfo');
  if (modelInfoEl) modelInfoEl.textContent = 'GLM-4.7 Flash · 智谱 AI';

  // 13. 显示欢迎页并连接（通过 init 初始化 token/deviceId 等）
  UI.showWelcome();
  StatusBar.set('connecting', '正在连接...');
  Gateway.init();
});

// 导出工具
const ExportUtils = {
  toast(msg) {
    const el = document.createElement('div');
    el.className = 'export-toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }
};
</script>
</body>
